<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlefield Clash Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .gradient-border {
            background: linear-gradient(to bottom right, #3b82f6, #8b5cf6);
            padding: 2px;
            border-radius: 0.75rem;
        }
        
        .card-container { position: relative; }
        .stats-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }
        .card-container:hover .stats-tooltip {
            visibility: visible;
            opacity: 1;
        }
        .stat-grid {
            display: grid;
            grid-template-cols: 1fr auto;
            gap: 2px 8px;
            font-size: 10px;
        }
        
        #game-screen { overflow: visible; padding-bottom: 120px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div id="game-container" class="w-full max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                BATTLEFIELD CLASH ONLINE
            </h1>
            <div id="user-info" class="text-[10px] text-slate-500 mt-1 uppercase tracking-widest font-bold">Connecting...</div>
            <p id="game-status" class="text-slate-400 mt-2">Connecting to game servers...</p>
        </header>

        <div id="game-screen">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="spinner mb-4"></div>
                <p>Establishing secure connection...</p>
            </div>
        </div>
    </div>

    <div id="log-container" class="fixed bottom-4 right-4 w-64 max-h-48 overflow-y-auto bg-black/50 p-3 rounded-lg text-xs text-slate-300 border border-white/10 hidden">
        <div class="font-bold mb-1 border-b border-white/10 pb-1">Battle Log</div>
        <div id="game-log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Card and Battlefield Definitions
        const CARDS_DATA = [
            { id: 'c1', name: "Ground Graveler", image: "GroundGraveler.jpeg", type: "Nature", level: 1, special: "Focused Training", stats: { strength: 5, speed: 15, agility: 14, health: 7, intelligence: 6, creativity: 13, accuracy: 10, stamina: 12, skill: 8, strategy: 10 } },
            { id: 'c2', name: "Tiny", image: "Tiny.jpeg", type: "Nature", level: 1, special: "Underdog Mentality", stats: { strength: 6, speed: 16, agility: 19, health: 7, intelligence: 9, creativity: 12, accuracy: 8, stamina: 10, skill: 8, strategy: 5 } },
            { id: 'c3', name: "Vine Thrasher", image: "VineThrasher.jpeg", type: "Nature", level: 2, special: "Set My Own Rules", stats: { strength: 16, speed: 7, agility: 11, health: 8, intelligence: 12, creativity: 11, accuracy: 4, stamina: 9, skill: 14, strategy: 13 } },
            { id: 'c4', name: "Bush Beast", image: "BushBeast.jpeg", type: "Nature", level: 2, special: "Reinforcements", stats: { strength: 7, speed: 16, agility: 13, health: 4, intelligence: 6, creativity: 14, accuracy: 12, stamina: 8, skill: 7, strategy: 18 } },
            { id: 'c5', name: "Villager", image: "Villager.jpeg", type: "Village", level: 1, special: "Battle Ready", stats: { strength: 7, speed: 12, agility: 11, health: 15, intelligence: 11, creativity: 9, accuracy: 10, stamina: 13, skill: 7, strategy: 5 } },
            { id: 'c6', name: "Realo", image: "Realo.jpeg", type: "Village", level: 1, special: "Rescue Mission", stats: { strength: 10, speed: 9, agility: 9, health: 8, intelligence: 13, creativity: 13, accuracy: 8, stamina: 11, skill: 8, strategy: 11 } },
            { id: 'c7', name: "Warrior", image: "Warrior.jpeg", type: "Village", level: 2, special: "Bonus Training", stats: { strength: 18, speed: 13, agility: 8, health: 8, intelligence: 5, creativity: 7, accuracy: 12, stamina: 13, skill: 12, strategy: 9 } },
            { id: 'c8', name: "Target Shielder", image: "TargetShielder.jpeg", type: "Village", level: 2, special: "Narrow It Down", stats: { strength: 4, speed: 9, agility: 6, health: 22, intelligence: 5, creativity: 7, accuracy: 17, stamina: 12, skill: 8, strategy: 15 } }
        ];

        const BATTLEFIELDS = [
            { name: "Jungle Fortress", type: "Nature", attrs: ["agility", "skill", "creativity"] },
            { name: "Underground Den", type: "Nature", attrs: ["stamina", "strategy", "speed"] },
            { name: "Tower Takedown", type: "Village", attrs: ["intelligence", "skill", "accuracy"] },
            { name: "Town Center", type: "Village", attrs: ["strength", "health", "speed"] }
        ];

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyC7J4szfCMOiVMl7P8kiy2XqE_bYlQvMoI","authDomain":"triplepower-8dca6.firebaseapp.com","projectId":"triplepower-8dca6","storageBucket":"triplepower-8dca6.firebasestorage.app","messagingSenderId":"73414403539","appId":"1:73414403539:web:d54faef95d2709a78e3b26"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'triplepower-default';

        let currentUser = null;
        let gameId = null;
        let gameData = null;
        let playerRole = null; 
        let isSinglePlayer = false;

        const screen = document.getElementById('game-screen');
        const statusText = document.getElementById('game-status');
        const userInfo = document.getElementById('user-info');

        // --- AUTH ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error", err);
                statusText.innerText = "Connection failed.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userInfo.innerText = `Logged in as: ${user.uid}`;
                renderMainMenu();
            }
        });

        // --- SINGLE PLAYER LOGIC ---
        window.startSinglePlayer = () => {
            isSinglePlayer = true;
            playerRole = 'p0';
            gameId = 'local_' + Date.now();
            
            gameData = {
                id: gameId,
                status: 'drafting',
                players: [
                    { uid: currentUser.uid, name: "You", hand: [] },
                    { uid: 'cpu', name: "Computer", hand: [] }
                ],
                pool: [...CARDS_DATA].sort(() => Math.random() - 0.5),
                draftOrder: [0, 1, 1, 0, 0, 1, 1, 0],
                draftStep: 0,
                activeCards: [null, null],
                battlefield: null,
                battleResults: null
            };

            processGameState();
        };

        async function triggerCPUMove() {
            if (!isSinglePlayer || gameData.status === 'finished') return;

            // Short delay to simulate AI thinking
            setTimeout(async () => {
                if (gameData.status === 'drafting') {
                    const pIdx = gameData.draftOrder[gameData.draftStep];
                    if (pIdx === 1) { 
                        // AI simply picks a card from the pool
                        const randomIdx = Math.floor(Math.random() * gameData.pool.length);
                        await window.pickCard(randomIdx); 
                    }
                } 
                else if (gameData.status === 'battle_selection') {
                    if (gameData.activeCards[1] === null) {
                        const cpuHand = gameData.players[1].hand;
                        if (cpuHand.length > 0) {
                            // AI picks its best card (simplified: picks random from hand)
                            const randomIdx = Math.floor(Math.random() * cpuHand.length);
                            await window.selectCardForBattle(randomIdx);
                        }
                    }
                }
            }, 1000);
        }

        // --- UI RENDERING ---
        function renderMainMenu() {
            screen.innerHTML = `
                <div class="text-center py-12">
                    <div class="bg-slate-800 p-10 rounded-3xl border border-white/10 shadow-2xl flex flex-col gap-4">
                        <h2 class="text-2xl font-bold mb-2">Ready for Battle?</h2>
                        <button id="find-match-btn" class="px-12 py-5 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-full font-black text-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                            FIND ONLINE MATCH
                        </button>
                        <button id="play-cpu-btn" class="px-12 py-4 bg-slate-700 hover:bg-slate-600 rounded-full font-bold text-lg transition-all active:scale-95 border border-white/5">
                            PLAY VS COMPUTER
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('find-match-btn').onclick = startMatchmaking;
            document.getElementById('play-cpu-btn').onclick = window.startSinglePlayer;
            statusText.innerText = "Select a game mode to begin.";
        }

        function createStatsHTML(stats) {
            return `
                <div class="stats-tooltip">
                    <div class="text-[9px] font-bold text-blue-400 mb-1 border-b border-white/10 pb-1 uppercase">Attribute Stats</div>
                    <div class="stat-grid">
                        ${Object.entries(stats).map(([key, val]) => `
                            <span class="capitalize text-slate-400">${key}</span>
                            <span class="font-bold text-white">${val}</span>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function updateBackgroundTheme() {
            if (!gameData || !gameData.battlefield) {
                document.body.style.background = "#0f172a";
                return;
            }
            const type = gameData.battlefield.type;
            document.body.style.background = type === "Nature" 
                ? "linear-gradient(to bottom, #064e3b, #0f172a)" 
                : "linear-gradient(to bottom, #451a03, #0f172a)";
            document.body.style.transition = "background 1s ease";
        }

        // --- MATCHMAKING ---
        async function startMatchmaking() {
            isSinglePlayer = false;
            statusText.innerText = "Searching for an opponent...";
            screen.innerHTML = `<div class="flex flex-col items-center justify-center py-20"><div class="spinner mb-6"></div><p class="text-xl font-bold animate-pulse">Searching...</p></div>`;

            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game');
            const lobbiesSnap = await getDoc(lobbyRef);
            const lobbyData = lobbiesSnap.data();

            if (lobbyData && lobbyData.hostId !== currentUser.uid && lobbyData.status === 'waiting') {
                gameId = lobbyData.gameId;
                playerRole = 'p1';
                await updateDoc(lobbyRef, { status: 'filled' });
                joinGame(gameId);
            } else {
                gameId = `game_${Date.now()}`;
                playerRole = 'p0';
                const newGame = {
                    id: gameId,
                    status: 'drafting',
                    players: [
                        { uid: currentUser.uid, name: "Player 1", hand: [] },
                        { uid: null, name: "Player 2", hand: [] }
                    ],
                    pool: [...CARDS_DATA].sort(() => Math.random() - 0.5),
                    draftOrder: [0, 1, 1, 0, 0, 1, 1, 0],
                    draftStep: 0,
                    activeCards: [null, null],
                    battlefield: null,
                    battleResults: null
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), newGame);
                await setDoc(lobbyRef, { gameId, hostId: currentUser.uid, status: 'waiting' });
                watchGame(gameId);
            }
        }

        async function joinGame(id) {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', id);
            const snap = await getDoc(gameRef);
            let data = snap.data();
            data.players[1].uid = currentUser.uid;
            await updateDoc(gameRef, { players: data.players });
            watchGame(id);
        }

        function watchGame(id) {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', id), (snapshot) => {
                if (!snapshot.exists()) return;
                gameData = snapshot.data();
                processGameState();
            });
        }

        function processGameState() {
            updateBackgroundTheme(); 
            if (!isSinglePlayer && gameData.status === 'drafting' && !gameData.players[1].uid) {
                renderWaitingForOpponent();
                return;
            }

            if (gameData.status === 'drafting') renderDraft();
            else if (gameData.status === 'battle_selection') renderBattleSelection();
            else if (gameData.status === 'battle_result') renderResultUI();
            else if (gameData.status === 'finished') renderEndGame();

            if (isSinglePlayer) triggerCPUMove();
        }

        function renderWaitingForOpponent() {
            statusText.innerText = "WAITING FOR OPPONENT";
            screen.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-center"><div class="spinner w-16 h-16 border-4 mb-8"></div><h2 class="text-3xl font-black mb-2">Waiting...</h2><button onclick="location.reload()" class="px-6 py-2 bg-slate-700 rounded-full text-xs mt-4">LEAVE LOBBY</button></div>`;
        }

        function renderDraft() {
            const pIndex = gameData.draftOrder[gameData.draftStep];
            const isMyTurn = (pIndex === 0 && playerRole === 'p0') || (pIndex === 1 && playerRole === 'p1');
            statusText.innerText = isMyTurn ? "YOUR TURN TO PICK" : "WAITING FOR PICK";

            screen.innerHTML = `
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    ${gameData.pool.map((card, idx) => `
                        <div class="card-container">
                            <div onclick="${isMyTurn ? `pickCard(${idx})` : ''}" class="gradient-border ${isMyTurn ? 'cursor-pointer hover:-translate-y-1' : 'opacity-50 grayscale cursor-not-allowed'} transition-all shadow-md">
                                <div class="bg-slate-800 p-2 rounded-lg h-full flex flex-col">
                                    <div class="flex justify-between items-start mb-1">
                                        <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-white/10 text-slate-300">${card.type}</span>
                                        <span class="text-[8px] font-bold text-yellow-500">LVL ${card.level}</span>
                                    </div>
                                    <div class="w-full h-24 bg-slate-900/50 rounded flex items-center justify-center mb-1 text-[8px] text-slate-600">${card.name}</div>
                                    <h3 class="font-bold text-[11px] truncate leading-tight">${card.name}</h3>
                                    <p class="text-[8px] text-slate-500 mt-0.5 italic truncate">${card.special}</p>
                                </div>
                            </div>
                            ${createStatsHTML(card.stats)}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.pickCard = async (idx) => {
            const pIdx = gameData.draftOrder[gameData.draftStep];
            const card = gameData.pool.splice(idx, 1)[0];
            gameData.players[pIdx].hand.push(card);
            gameData.draftStep++;

            if (gameData.draftStep >= gameData.draftOrder.length) {
                gameData.status = 'battle_selection';
                gameData.battlefield = BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)];
            }

            if (isSinglePlayer) {
                processGameState();
            } else {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), gameData);
            }
        };

        function renderBattleSelection() {
            const myIdx = playerRole === 'p0' ? 0 : 1;
            const myCardSelected = gameData.activeCards[myIdx] !== null;

            if (gameData.activeCards[0] && gameData.activeCards[1]) {
                if (playerRole === 'p0') resolveBattle();
                statusText.innerText = "RESOLVING CLASH...";
                screen.innerHTML = `<div class="flex justify-center py-20"><div class="spinner"></div></div>`;
                return;
            }

            statusText.innerText = myCardSelected ? "Waiting for move..." : "SELECT YOUR CHAMPION";
            const field = gameData.battlefield;
            const myHand = gameData.players[myIdx].hand;

            screen.innerHTML = `
                <div class="mb-6 p-6 bg-slate-800/80 rounded-xl border border-white/10 text-center shadow-2xl">
                    <div class="inline-block px-3 py-1 mb-2 rounded-full text-[10px] font-bold tracking-widest uppercase bg-blue-500/20 text-blue-300 border border-blue-500/30">${field.type} Battlefield</div>
                    <h2 class="text-3xl font-black text-white mb-2">${field.name}</h2>
                    <div class="flex justify-center gap-2">${field.attrs.map(a => `<span class="px-2 py-1 bg-white/5 rounded text-xs font-mono text-slate-300 capitalize border border-white/5">${a}</span>`).join('')}</div>
                </div>
                <div class="flex flex-col items-center">
                    ${myCardSelected ? `<div class="p-8 text-center bg-blue-500/10 rounded-xl border border-blue-500/20 animate-pulse font-bold text-blue-400">UNIT DEPLOYED...</div>` : `
                        <div class="flex flex-wrap justify-center gap-4">
                            ${myHand.map((card, idx) => `
                                <div class="card-container">
                                    <div onclick="selectCardForBattle(${idx})" class="w-28 bg-slate-800 p-2.5 rounded-xl border-2 border-transparent hover:border-blue-500 cursor-pointer transition-all hover:scale-105 shadow-lg">
                                        <div class="w-full h-20 bg-slate-900/50 rounded mb-2"></div>
                                        <div class="flex justify-between items-center mb-1"><span class="text-[8px] font-bold text-slate-500">${card.type}</span><span class="text-[8px] text-yellow-600">L${card.level}</span></div>
                                        <div class="text-[11px] font-bold truncate">${card.name}</div>
                                    </div>
                                    ${createStatsHTML(card.stats)}
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        window.selectCardForBattle = async (idx) => {
            let movingIdx;
            if (isSinglePlayer) {
                movingIdx = (gameData.activeCards[0] === null) ? 0 : 1;
            } else {
                movingIdx = (playerRole === 'p0' ? 0 : 1);
            }

            const card = gameData.players[movingIdx].hand.splice(idx, 1)[0];
            gameData.activeCards[movingIdx] = card;

            if (isSinglePlayer) {
                processGameState();
            } else {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), gameData);
            }
        };

        async function resolveBattle() {
            const field = gameData.battlefield;
            const card0 = gameData.activeCards[0];
            const card1 = gameData.activeCards[1];
            let activeBattleAttrs = [...field.attrs];
            let activations = ["", ""]; 
            let finalScores = [0, 0];

            [card0, card1].forEach((card, i) => {
                activeBattleAttrs.forEach(attr => { finalScores[i] += (card.stats[attr] || 0); });
                if (card.type === field.type && card.special === "Focused Training") {
                    finalScores[i] += 2;
                    activations[i] = "Special: +2 attribute total!";
                }
            });

            const winnerIdx = finalScores[0] >= finalScores[1] ? 0 : 1;
            const loserIdx = 1 - winnerIdx;
            const cardCaptured = gameData.activeCards[loserIdx];
            gameData.players[winnerIdx].hand.push(cardCaptured);
            
            gameData.status = gameData.players[loserIdx].hand.length === 0 ? 'finished' : 'battle_result';
            gameData.battleResults = { scores: finalScores, winnerIdx, attrs: activeBattleAttrs, activations };

            if (isSinglePlayer) {
                processGameState();
            } else {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), gameData);
            }
        }

        function renderResultUI() {
            const res = gameData.battleResults;
            screen.innerHTML = `
                <div class="mb-6 text-center">
                    <div class="text-4xl font-black mb-6">Player ${res.winnerIdx + 1} Wins!</div>
                </div>
                <div class="flex justify-center gap-6 mb-8">
                    <div class="bg-slate-800 p-6 rounded-2xl border-4 ${res.winnerIdx === 0 ? 'border-green-500' : 'border-red-900/30'}">
                        <div class="text-4xl font-black">${res.scores[0]}</div>
                        <div class="text-[10px] text-slate-500 uppercase">${gameData.activeCards[0].name}</div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border-4 ${res.winnerIdx === 1 ? 'border-green-500' : 'border-red-900/30'}">
                        <div class="text-4xl font-black">${res.scores[1]}</div>
                        <div class="text-[10px] text-slate-500 uppercase">${gameData.activeCards[1].name}</div>
                    </div>
                </div>
                <div class="text-center">
                    ${playerRole === 'p0' ? `<button onclick="nextRound()" class="bg-blue-600 px-12 py-4 rounded-full font-bold">Next Battlefield</button>` : `<p class="animate-pulse">Waiting for host...</p>`}
                </div>
            `;
        }

        window.nextRound = async () => {
            const winnerIdx = gameData.battleResults.winnerIdx;
            const winningCard = gameData.activeCards[winnerIdx];
            gameData.activeCards = [null, null];
            gameData.activeCards[winnerIdx] = winningCard;
            gameData.status = 'battle_selection';
            gameData.battlefield = BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)];
            gameData.battleResults = null;

            if (isSinglePlayer) processGameState();
            else await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), gameData);
        };

        function renderEndGame() {
            const winnerIdx = gameData.battleResults.winnerIdx;
            screen.innerHTML = `<div class="text-center py-12"><h2 class="text-6xl font-black text-yellow-500 mb-6">VICTORY</h2><p class="text-2xl mb-12">Player ${winnerIdx + 1} Wins!</p><button onclick="location.reload()" class="bg-white text-black px-12 py-4 rounded-full font-bold">Return to Menu</button></div>`;
        }

        initAuth();
    </script>
</body>
</html>
