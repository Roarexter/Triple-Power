<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriplePower Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .arena-bg { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        .card-pop { animation: cardPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardPop { from { transform: scale(0.8) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="min-h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 w-full h-20 px-8 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/40">
                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <h1 class="font-game font-black text-xl tracking-widest text-blue-500">TRIPLEPOWER</h1>
        </div>
        <div id="auth-status" class="flex items-center gap-4">
            <!-- Auth Info Appears Here -->
        </div>
    </header>

    <main class="h-screen flex flex-col items-center justify-center p-6 pt-24">
        
        <!-- LOBBY SCREEN -->
        <div id="view-lobby" class="w-full max-w-md text-center space-y-8">
            <div id="lobby-content">
                <h2 class="text-4xl font-game font-black mb-2 italic">ARENA READY</h2>
                <p class="text-slate-400 mb-8">Login to enter the global matchmaking grid.</p>
                
                <div id="auth-forms" class="glass p-8 rounded-[2rem] space-y-4">
                    <input id="email" type="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="password" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <div class="flex gap-2">
                        <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black uppercase tracking-widest text-sm transition-all">Login</button>
                        <button onclick="handleAuth('signup')" class="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-xl font-black uppercase tracking-widest text-sm transition-all border border-slate-700">Join</button>
                    </div>
                </div>
            </div>

            <div id="matchmaking-zone" class="hidden space-y-6">
                <button id="btn-search" onclick="startMatchmaking()" class="w-full bg-blue-600 hover:bg-blue-500 py-8 rounded-[2.5rem] font-game font-black text-2xl shadow-2xl shadow-blue-900/40 transform active:scale-95 transition-all">
                    FIND MATCH
                </button>
                <button onclick="toggleVault()" class="text-xs font-black text-slate-500 hover:text-white uppercase tracking-widest">Open Vault</button>
            </div>

            <div id="searching-zone" class="hidden glass p-10 rounded-[3rem] space-y-6">
                <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
                <p class="font-game font-black text-blue-400 tracking-widest loading-dots">SCANNING GRID</p>
                <button onclick="cancelSearch()" class="text-[10px] font-black text-slate-500 hover:text-red-400 uppercase tracking-widest">Abort Signal</button>
            </div>
        </div>

        <!-- BATTLE SCREEN -->
        <div id="view-battle" class="hidden fixed inset-0 z-40 arena-bg flex flex-col p-6 overflow-hidden">
            <!-- Field Info -->
            <div id="battle-header" class="max-w-4xl mx-auto w-full glass p-6 rounded-3xl mb-4 flex justify-between items-center border-blue-500/30">
                <div id="arena-info"></div>
                <div id="turn-indicator" class="px-6 py-2 bg-blue-600/20 border border-blue-500/30 rounded-full font-black text-xs text-blue-400 tracking-widest">WAITING...</div>
            </div>

            <!-- Arena Grid -->
            <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 items-center max-w-6xl mx-auto w-full gap-8">
                <!-- Opponent -->
                <div class="text-center space-y-4">
                    <div id="opp-slot" class="w-48 h-72 mx-auto rounded-[2rem] glass flex items-center justify-center border-2 border-dashed border-slate-700 transition-all duration-500">
                        <span class="text-slate-600 font-black text-[10px] uppercase">Scanning...</span>
                    </div>
                    <p id="opp-name" class="text-xs font-black text-slate-500 uppercase tracking-widest">Opponent</p>
                    <div id="opp-cards-left" class="text-blue-500/40 font-game text-xl font-black">0 CARDS</div>
                </div>

                <!-- Match Status -->
                <div class="text-center space-y-4">
                    <div id="round-number" class="text-slate-500 font-game text-xs font-black tracking-[0.3em]">ROUND 1</div>
                    <div id="battle-status" class="text-5xl font-game font-black text-white italic drop-shadow-lg">VS</div>
                    <div id="match-log" class="text-[10px] font-bold text-blue-400 uppercase h-12 overflow-hidden"></div>
                </div>

                <!-- Player -->
                <div class="text-center space-y-4">
                    <div id="player-slot" class="w-48 h-72 mx-auto rounded-[2rem] glass flex items-center justify-center border-2 border-dashed border-blue-900/30 transition-all duration-500">
                        <span class="text-blue-500/30 font-black text-[10px] uppercase">Ready</span>
                    </div>
                    <p class="text-xs font-black text-blue-400 uppercase tracking-widest">You</p>
                    <div id="player-cards-left" class="text-blue-500 font-game text-xl font-black">0 CARDS</div>
                </div>
            </div>

            <!-- Hand -->
            <div class="max-w-5xl mx-auto w-full glass p-6 rounded-t-[3rem] border-b-0">
                <div id="hand-container" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 justify-start lg:justify-center"></div>
            </div>
        </div>
    </main>

    <!-- VAULT MODAL -->
    <div id="vault-modal" class="hidden fixed inset-0 z-[100] bg-slate-950 p-8 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-game font-black text-blue-500">THE VAULT</h2>
                <button onclick="toggleVault()" class="p-4 rounded-full border border-slate-800 font-black px-8">CLOSE</button>
            </div>
            <div id="vault-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[200] opacity-0 transition-all duration-500 pointer-events-none">
        <div id="toast-msg" class="bg-blue-600 text-white font-black text-xs px-8 py-4 rounded-full shadow-2xl uppercase tracking-widest"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // --- Config ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'triplepower-v1';

        // --- Game Data ---
        const STARTER_DECK = [
            { id: "01", name: "Graveler", type: "Nature", special: "Focused Training", stats: { strength: 12, speed: 8, agility: 9, health: 15, strategy: 5 } },
            { id: "02", name: "Tiny", type: "Nature", special: "Underdog", stats: { strength: 6, speed: 18, agility: 14, health: 7, strategy: 4 } },
            { id: "03", name: "Vine Thrasher", type: "Nature", special: "Slasher", stats: { strength: 16, speed: 10, agility: 11, health: 10, strategy: 12 } },
            { id: "04", name: "Bush Beast", type: "Nature", special: "Ambush", stats: { strength: 8, speed: 14, agility: 15, health: 12, strategy: 18 } },
            { id: "05", name: "Villager", type: "Village", special: "Battle Ready", stats: { strength: 10, speed: 10, agility: 10, health: 15, strategy: 10 } },
            { id: "06", name: "Warrior", type: "Village", special: "Crush", stats: { strength: 18, speed: 12, agility: 9, health: 15, strategy: 5 } }
        ];

        const ARENAS = [
            { name: "Jungle Fortress", type: "Nature", attributes: ["strength", "agility"] },
            { name: "Tower Takedown", type: "Village", attributes: ["strategy", "health"] },
            { name: "Deep Woods", type: "Nature", attributes: ["agility", "speed"] }
        ];

        // --- State ---
        let user = null, userData = null, activeMatchId = null;

        // --- Auth Functions ---
        window.handleAuth = async (mode) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) return showToast("Enter credentials");

            try {
                if (mode === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'data'), {
                        email, wins: 0, cards: STARTER_DECK.map(c => ({...c, instanceId: Math.random().toString(36).substr(2, 9)}))
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) { showToast(err.message); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (user) {
                const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                onSnapshot(ref, (snap) => {
                    userData = snap.data();
                    document.getElementById('auth-status').innerHTML = `
                        <div class="text-right">
                            <p class="text-[10px] font-black uppercase text-blue-500">${userData.email}</p>
                            <p class="text-[8px] font-bold text-slate-500 uppercase">${userData.wins} Wins</p>
                        </div>
                        <button onclick="handleLogout()" class="w-8 h-8 rounded-full border border-slate-800 flex items-center justify-center hover:bg-red-500/10">
                            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m4 4H7"></path></svg>
                        </button>
                    `;
                    document.getElementById('auth-forms').classList.add('hidden');
                    document.getElementById('lobby-content').classList.add('hidden');
                    document.getElementById('matchmaking-zone').classList.remove('hidden');
                });
            } else {
                document.getElementById('auth-status').innerHTML = '';
                document.getElementById('auth-forms').classList.remove('hidden');
                document.getElementById('lobby-content').classList.remove('hidden');
                document.getElementById('matchmaking-zone').classList.add('hidden');
            }
        });

        // --- Matchmaking ---
        window.startMatchmaking = async () => {
            document.getElementById('matchmaking-zone').classList.add('hidden');
            document.getElementById('searching-zone').classList.remove('hidden');

            const qRef = doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'global');
            const snap = await getDoc(qRef);

            if (snap.exists() && snap.data().p1 && snap.data().p1 !== user.uid) {
                const mid = `${snap.data().p1}_${user.uid}`;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', mid), {
                    p1: snap.data().p1, p1Cards: snap.data().p1Cards,
                    p2: user.uid, p2Cards: userData.cards,
                    arena: ARENAS[Math.floor(Math.random() * ARENAS.length)],
                    status: 'active', round: 1, lastUpdate: Date.now()
                });
                await deleteDoc(qRef);
                joinMatch(mid);
            } else {
                await setDoc(qRef, { p1: user.uid, p1Cards: userData.cards, time: Date.now() });
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), (s) => {
                    s.docChanges().forEach(change => {
                        if (change.type === "added" && change.doc.id.includes(user.uid)) {
                            unsub();
                            joinMatch(change.doc.id);
                        }
                    });
                });
            }
        };

        window.cancelSearch = async () => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'global'));
            document.getElementById('matchmaking-zone').classList.remove('hidden');
            document.getElementById('searching-zone').classList.add('hidden');
        };

        // --- Battle Logic ---
        function joinMatch(mid) {
            activeMatchId = mid;
            document.getElementById('view-lobby').classList.add('hidden');
            document.getElementById('view-battle').classList.remove('hidden');
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'matches', mid), (snap) => {
                if (snap.exists()) renderMatch(snap.data());
                else location.reload();
            });
        }

        function renderMatch(m) {
            const isP1 = m.p1 === user.uid;
            const myHand = isP1 ? m.p1Cards : m.p2Cards;
            const myMove = isP1 ? m.p1Move : m.p2Move;
            const oppMove = isP1 ? m.p2Move : m.p1Move;
            const oppHand = isP1 ? m.p2Cards : m.p1Cards;

            // Header
            document.getElementById('arena-info').innerHTML = `
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${m.arena.type} Field</p>
                <h3 class="text-xl font-game font-black italic uppercase">${m.arena.name}</h3>
            `;
            document.getElementById('round-number').innerText = `ROUND ${m.round}`;

            // Hand
            if (!myMove && !m.winner) {
                document.getElementById('hand-container').innerHTML = myHand.map((c, i) => `
                    <div onclick="playCard(${i})" class="flex-shrink-0 w-32 glass p-4 rounded-2xl cursor-pointer hover:border-blue-500 card-pop border-slate-800">
                        <p class="text-[8px] text-blue-500 font-bold uppercase">${c.type}</p>
                        <p class="text-[10px] font-black uppercase truncate">${c.name}</p>
                        <div class="mt-2 grid grid-cols-2 gap-1 opacity-40 text-[6px]">
                            ${Object.entries(c.stats).map(([k,v]) => `<span>${k.charAt(0)}:${v}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
                document.getElementById('turn-indicator').innerText = "YOUR TURN";
            } else {
                document.getElementById('hand-container').innerHTML = `<p class="text-slate-600 font-black text-xs uppercase animate-pulse">Waiting for tactical resolution...</p>`;
                document.getElementById('turn-indicator').innerText = m.winner ? "MATCH OVER" : "WAITING FOR OPPONENT";
            }

            // Center View
            document.getElementById('player-slot').innerHTML = myMove ? cardUI(myMove) : `<span class="text-blue-500/20 font-black text-[10px]">READY</span>`;
            document.getElementById('opp-slot').innerHTML = (oppMove && myMove) ? cardUI(oppMove) : `<span class="text-slate-700 font-black text-[10px]">? ? ?</span>`;
            document.getElementById('player-cards-left').innerText = `${myHand.length} UNITS`;
            document.getElementById('opp-cards-left').innerText = `${oppHand.length} UNITS`;

            // Logic Resolution (Triggered by P1)
            if (isP1 && m.p1Move && m.p2Move && !m.resolving) resolveRound(m);

            if (m.winner) {
                const win = m.winner === user.uid;
                document.getElementById('battle-status').innerText = win ? "VICTORY" : "DEFEAT";
                document.getElementById('battle-status').className = `text-6xl font-game font-black italic ${win ? 'text-green-500' : 'text-red-500'} animate-bounce`;
                setTimeout(() => { if (isP1) deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', activeMatchId)); }, 10000);
            }
        }

        window.playCard = async (idx) => {
            const isP1 = activeMatchId.startsWith(user.uid);
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', activeMatchId);
            const mData = (await getDoc(mRef)).data();
            const card = isP1 ? mData.p1Cards[idx] : mData.p2Cards[idx];
            await updateDoc(mRef, { [isP1 ? 'p1Move' : 'p2Move']: card });
        };

        async function resolveRound(m) {
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', activeMatchId);
            await updateDoc(mRef, { resolving: true });

            const s1 = calculateScore(m.p1Move, m.arena);
            const s2 = calculateScore(m.p2Move, m.arena);

            let p1Cards = [...m.p1Cards], p2Cards = [...m.p2Cards];
            if (s1 > s2) {
                p1Cards.push(m.p2Move);
                p2Cards = p2Cards.filter(c => c.instanceId !== m.p2Move.instanceId);
            } else if (s2 > s1) {
                p2Cards.push(m.p1Move);
                p1Cards = p1Cards.filter(c => c.instanceId !== m.p1Move.instanceId);
            }

            setTimeout(async () => {
                const winner = p1Cards.length === 0 ? m.p2 : (p2Cards.length === 0 ? m.p1 : null);
                if (winner) {
                    await updateDoc(mRef, { winner, p1Cards, p2Cards, resolving: false });
                    await updateDoc(doc(db, 'artifacts', appId, 'users', winner, 'profile', 'data'), { wins: increment(1) });
                } else {
                    await updateDoc(mRef, {
                        p1Cards, p2Cards, p1Move: null, p2Move: null, 
                        arena: ARENAS[Math.floor(Math.random() * ARENAS.length)],
                        round: increment(1), resolving: false
                    });
                }
            }, 3000);
        }

        function calculateScore(card, arena) {
            let total = 0;
            arena.attributes.forEach(attr => { total += (card.stats[attr] || 0); });
            if (card.type === arena.type) total += 5; // Type Bonus
            return total;
        }

        function cardUI(c) {
            return `
                <div class="p-4 text-center h-full flex flex-col justify-center card-pop">
                    <p class="text-[8px] text-blue-400 font-bold uppercase mb-1">${c.type}</p>
                    <h4 class="text-xl font-game font-black italic uppercase leading-none mb-2">${c.name}</h4>
                    <p class="text-[7px] text-slate-500 font-bold uppercase tracking-widest">${c.special}</p>
                </div>
            `;
        }

        // --- UI Utilities ---
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        };

        window.toggleVault = () => {
            const v = document.getElementById('vault-modal');
            v.classList.toggle('hidden');
            if (!v.classList.contains('hidden')) {
                document.getElementById('vault-grid').innerHTML = userData.cards.map(c => `
                    <div class="glass p-6 rounded-2xl border-slate-800">
                        <p class="text-[8px] text-blue-500 font-black uppercase mb-1">${c.type}</p>
                        <h5 class="text-sm font-game font-black uppercase mb-2">${c.name}</h5>
                        <div class="grid grid-cols-2 gap-1 opacity-40 text-[7px] uppercase">
                            ${Object.entries(c.stats).map(([k,v]) => `<span>${k}:${v}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
