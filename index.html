<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriplePower Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .arena-bg { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); transition: background 1s ease; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-enter { animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardPop { from { transform: scale(0.8) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-slate-100 min-h-screen overflow-hidden">

    <!-- TOP HEADER -->
    <header class="fixed top-0 left-0 w-full h-20 px-8 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/40">
                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <h1 class="font-game font-black text-xl tracking-widest text-blue-500">TRIPLEPOWER</h1>
        </div>
        <div id="auth-zone" class="flex items-center">
            <button onclick="toggleAuthModal()" class="text-sm font-black uppercase tracking-widest hover:text-blue-400">Connect System</button>
        </div>
    </header>

    <main class="relative h-screen flex flex-col items-center justify-center p-6">
        <!-- LOBBY VIEW -->
        <div id="view-lobby" class="w-full max-w-sm text-center">
            <div id="matchmaking-status" class="hidden glass p-10 rounded-[3rem] shadow-2xl space-y-8">
                <div class="flex justify-center mb-4">
                    <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                </div>
                <p class="font-game font-black text-blue-400 tracking-widest text-xl loading-dots">SEARCHING GRID</p>
                <button onclick="cancelSearch()" class="mt-4 text-[10px] font-black text-slate-500 hover:text-red-400 uppercase tracking-[0.2em]">Abort Signal</button>
            </div>

            <div id="action-buttons" class="space-y-6">
                <button onclick="startMatchmaking()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-8 rounded-[2.5rem] font-black text-2xl font-game shadow-2xl shadow-blue-900/40 transform active:scale-95 transition-all">
                    ENTER MATCH
                </button>
                <div class="flex justify-center gap-6">
                    <button onclick="showVault()" class="text-xs font-black text-slate-500 hover:text-white uppercase tracking-widest transition-colors">The Vault</button>
                </div>
            </div>
        </div>

        <!-- BATTLE ARENA VIEW -->
        <div id="view-battle" class="hidden fixed inset-0 z-40 arena-bg flex flex-col p-6 overflow-hidden">
            <div id="arena-header" class="max-w-4xl mx-auto w-full glass p-6 rounded-3xl mb-8 flex justify-between items-center border-blue-500/30"></div>

            <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 items-center max-w-6xl mx-auto w-full gap-8">
                <!-- Enemy Slot -->
                <div class="text-center space-y-4">
                    <div id="opp-card" class="w-56 h-80 mx-auto rounded-[2rem] glass flex flex-col items-center justify-center border-2 border-dashed border-slate-700 transition-all duration-500">
                        <span class="text-slate-600 font-black uppercase text-xs tracking-widest">Waiting...</span>
                    </div>
                    <p id="opp-label" class="text-xs font-black text-slate-500 uppercase tracking-widest">Opponent</p>
                    <div id="opp-score" class="text-3xl font-game font-black text-slate-700">00</div>
                </div>

                <!-- Center Status -->
                <div class="text-center">
                    <div id="battle-status" class="text-4xl font-game font-black text-slate-800 uppercase tracking-tighter">PREPARING...</div>
                    <div id="round-alert" class="hidden mt-4 px-6 py-3 bg-yellow-500 text-black font-black text-[10px] rounded-xl animate-pulse uppercase tracking-widest"></div>
                    <div id="match-outcome" class="hidden text-5xl font-game font-black text-blue-500 mt-6 animate-bounce"></div>
                </div>

                <!-- Player Slot -->
                <div class="text-center space-y-4">
                    <div id="player-card" class="w-56 h-80 mx-auto rounded-[2rem] glass flex flex-col items-center justify-center border-2 border-dashed border-blue-900/30 transition-all duration-500">
                        <span class="text-blue-500/30 font-black uppercase text-xs tracking-widest">Deploy Unit</span>
                    </div>
                    <p class="text-xs font-black text-white uppercase tracking-widest">Commanding Officer</p>
                    <div id="player-score" class="text-3xl font-game font-black text-blue-500">00</div>
                </div>
            </div>

            <!-- Hand Bar -->
            <div id="deployment-bar" class="max-w-5xl mx-auto w-full glass p-6 rounded-t-[3rem] border-b-0 shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
                <p class="text-[10px] font-black text-slate-500 uppercase text-center mb-4 tracking-[0.3em]">
                    Your Fleet (<span id="hand-count">0</span> units)
                </p>
                <div id="hand-cards" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 justify-start lg:justify-center"></div>
            </div>
        </div>
    </main>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="hidden fixed inset-0 z-[100] bg-slate-950/90 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] shadow-2xl relative border-blue-500/20">
            <button onclick="toggleAuthModal()" class="absolute top-6 right-8 text-slate-500 hover:text-white font-black">X</button>
            <h3 id="auth-title" class="text-2xl font-game font-black mb-8 text-center text-blue-500 uppercase">System Login</h3>
            <form id="auth-form" class="space-y-4">
                <input id="auth-user" type="text" placeholder="AGENT NAME" class="hidden w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm text-white uppercase">
                <input id="auth-email" type="email" placeholder="EMAIL ADDRESS" required class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm text-white">
                <input id="auth-pass" type="password" placeholder="PASSWORD" required class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm text-white">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg">Authorize</button>
            </form>
            <p onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-center mt-6 text-[10px] font-black text-slate-500 hover:text-blue-400 cursor-pointer uppercase tracking-widest">New Agent? Register Here</p>
        </div>
    </div>

    <!-- VAULT -->
    <div id="vault-modal" class="hidden fixed inset-0 z-[60] bg-slate-950 p-12 overflow-y-auto">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-4xl font-game font-black text-blue-500 uppercase tracking-widest">The Vault</h2>
                <button onclick="hideVault()" class="bg-slate-900 hover:bg-slate-800 p-4 rounded-full border border-slate-800 font-black px-8">CLOSE</button>
            </div>
            <div id="vault-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, onSnapshot, increment, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC7J4szfCMOiVMl7P8kiy2XqE_bYlQvMoI", authDomain: "triplepower-8dca6.firebaseapp.com", projectId: "triplepower-8dca6", storageBucket: "triplepower-8dca6.firebasestorage.app", messagingSenderId: "73414403539", appId: "1:73414403539:web:d54faef95d2709a78e3b26" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'triplepower-v9-matchfix';

        const STARTER_DECK = [
            { name: "Ground Graveler", type: "Nature", special: "Focused Training", stats: { Strength: 5, Speed: 15, Agility: 14, Health: 7, Intelligence: 6, Creativity: 13, Accuracy: 10, Stamina: 12, Skill: 8, Strategy: 10 } },
            { name: "Tiny", type: "Nature", special: "Underdog Mentality", stats: { Strength: 6, Speed: 16, Agility: 19, Health: 7, Intelligence: 9, Creativity: 12, Accuracy: 8, Stamina: 10, Skill: 8, Strategy: 5 } },
            { name: "Vine Thrasher", type: "Nature", special: "Set My Own Rules", stats: { Strength: 16, Speed: 7, Agility: 11, Health: 8, Intelligence: 12, Creativity: 11, Accuracy: 4, Stamina: 9, Skill: 14, Strategy: 13 } },
            { name: "Bush Beast", type: "Nature", special: "Reinforcements", stats: { Strength: 7, Speed: 16, Agility: 13, Health: 4, Intelligence: 6, Creativity: 14, Accuracy: 12, Stamina: 8, Skill: 7, Strategy: 18 } },
            { name: "Villager", type: "Village", special: "Battle Ready", stats: { Strength: 7, Speed: 12, Agility: 11, Health: 15, Intelligence: 11, Creativity: 9, Accuracy: 10, Stamina: 13, Skill: 7, Strategy: 5 } },
            { name: "Realo", type: "Village", special: "Rescue Mission", stats: { Strength: 10, Speed: 9, Agility: 9, Health: 8, Intelligence: 13, Creativity: 13, Accuracy: 8, Stamina: 11, Skill: 8, Strategy: 11 } },
            { name: "Warrior", type: "Village", special: "Bonus Training", stats: { Strength: 18, Speed: 13, Agility: 8, Health: 8, Intelligence: 5, Creativity: 7, Accuracy: 12, Stamina: 13, Skill: 12, Strategy: 9 } },
            { name: "Target Shielder", type: "Village", special: "Narrow It Down", stats: { Strength: 4, Speed: 9, Agility: 6, Health: 22, Intelligence: 5, Creativity: 7, Accuracy: 17, Stamina: 12, Skill: 8, Strategy: 15 } }
        ];

        const ARENAS = [
            { name: "Jungle Fortress", type: "Nature", attributes: ["Strength", "Agility", "Stamina"] },
            { name: "Tower Takedown", type: "Village", attributes: ["Strategy", "Intelligence", "Skill"] },
            { name: "Training Camp", type: "Village", attributes: ["Speed", "Accuracy", "Creativity"] },
            { name: "Deep Woods", type: "Nature", attributes: ["Health", "Stamina", "Agility"] }
        ];

        let currentUser = null, myCollection = [], isLogin = true, activeMatchId = null;

        // UI HELPERS
        window.toggleAuthModal = () => document.getElementById('auth-modal').classList.toggle('hidden');
        window.toggleAuthMode = () => { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'System Login' : 'Create Account'; document.getElementById('auth-user').classList.toggle('hidden', isLogin); };
        window.showVault = () => { renderVault(); document.getElementById('vault-modal').classList.remove('hidden'); };
        window.hideVault = () => document.getElementById('vault-modal').classList.add('hidden');
        window.handleSignOut = async () => { await signOut(auth); window.location.reload(); };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            try {
                if (isLogin) await signInWithEmailAndPassword(auth, email, pass);
                else {
                    const name = document.getElementById('auth-user').value || 'Agent X';
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: name });
                }
                toggleAuthModal();
            } catch (err) { alert(err.message); }
        });

        onAuthStateChanged(auth, async user => {
            currentUser = user;
            if (user) {
                const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const snap = await getDoc(ref);
                if (!snap.exists()) {
                    await setDoc(ref, { username: user.displayName, wins: 0, cards: STARTER_DECK.map(c => ({...c, instanceId: Math.random().toString(36).substr(2, 9)})) });
                }
                document.getElementById('auth-zone').innerHTML = `
                    <div class="flex items-center gap-4 text-right">
                        <div class="hidden sm:block">
                            <p class="text-[10px] text-blue-500 font-black uppercase tracking-widest">${user.displayName}</p>
                            <p id="win-counter" class="text-[8px] text-slate-500 font-bold tracking-widest">0 WINS</p>
                        </div>
                        <button onclick="handleSignOut()" class="w-10 h-10 rounded-full border border-slate-800 flex items-center justify-center hover:bg-red-500/10 transition-colors">
                            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m4 4H7"></path></svg>
                        </button>
                    </div>
                `;
                onSnapshot(ref, s => { if (s.exists()) { myCollection = s.data().cards; document.getElementById('win-counter').innerText = `${s.data().wins} WINS`; document.getElementById('hand-count').innerText = myCollection.length; }});
            } else {
                document.getElementById('auth-zone').innerHTML = `<button onclick="toggleAuthModal()" class="text-xs font-black uppercase tracking-widest">Connect System</button>`;
            }
        });

        // MATCHMAKING LOGIC
        window.startMatchmaking = async () => {
            if (!currentUser) return toggleAuthModal();
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('matchmaking-status').classList.remove('hidden');
            
            const qRef = doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'global');
            const snap = await getDoc(qRef);

            if (snap.exists() && snap.data().p1 && snap.data().p1 !== currentUser.uid) {
                const p1Data = snap.data();
                const mid = `${p1Data.p1}_${currentUser.uid}`;
                // Setup Match
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', mid), {
                    p1: p1Data.p1, p1Name: p1Data.p1Name, p1Cards: p1Data.p1Cards,
                    p2: currentUser.uid, p2Name: currentUser.displayName, p2Cards: myCollection,
                    arena: ARENAS[Math.floor(Math.random() * ARENAS.length)],
                    status: 'active', round: 1, lastMove: Date.now()
                });
                // Clear Queue
                await deleteDoc(qRef);
                joinBattle(mid);
            } else {
                // Join Queue
                await setDoc(qRef, { p1: currentUser.uid, p1Name: currentUser.displayName, p1Cards: myCollection, time: Date.now() });
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), s => { 
                    s.docChanges().forEach(change => {
                        if (change.type === "added" && change.doc.id.includes(currentUser.uid)) {
                            unsub();
                            joinBattle(change.doc.id);
                        }
                    });
                });
            }
        };

        window.cancelSearch = async () => { 
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'global')); 
            document.getElementById('action-buttons').classList.remove('hidden'); 
            document.getElementById('matchmaking-status').classList.add('hidden'); 
        };

        // BATTLE SYSTEM
        function joinBattle(mid) {
            activeMatchId = mid;
            document.getElementById('view-lobby').classList.add('hidden');
            document.getElementById('view-battle').classList.remove('hidden');
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'matches', mid), s => { 
                if (s.exists()) renderArena(s.data()); else leaveBattle(); 
            });
        }

        function leaveBattle() { 
            activeMatchId = null;
            document.getElementById('view-battle').classList.add('hidden'); 
            document.getElementById('view-lobby').classList.remove('hidden'); 
            document.getElementById('action-buttons').classList.remove('hidden'); 
            document.getElementById('matchmaking-status').classList.add('hidden'); 
        }

        const calculateScore = (card, arena, team) => {
            if (!card || !arena) return { total: 0, log: [], special: "" };
            let total = 0, log = [], specialText = "";
            arena.attributes.forEach(attr => {
                let val = card.stats[attr] || 0;
                total += val;
                log.push(`${attr}: ${val}`);
            });
            if (card.type === arena.type) {
                specialText = card.special;
                if (card.special === "Battle Ready") { total += 3; log.push("+3 Battle Ready"); }
                if (card.special === "Reinforcements") { const count = team.filter(c => c.type === card.type).length; total += count; log.push(`+${count} Reinforcements`); }
                if (card.special === "Focused Training") { total += 2; log.push("+2 Focused Training"); }
                if (card.special === "Underdog Mentality") { total += 4; log.push("+4 Underdog Mentality"); }
            }
            return { total, log, special: specialText };
        };

        function renderArena(m) {
            const isP1 = m.p1 === currentUser.uid;
            const myHand = isP1 ? m.p1Cards : m.p2Cards;
            const myPlay = isP1 ? m.p1Played : m.p2Played;
            const oppPlay = isP1 ? m.p2Played : m.p1Played;

            document.getElementById('arena-header').innerHTML = `
                <div>
                    <p class="text-[10px] text-blue-500 font-black uppercase tracking-widest">${m.arena.type} Protocol</p>
                    <h4 class="text-xl font-game font-black uppercase">${m.arena.name}</h4>
                </div>
                <div class="flex gap-2">${m.arena.attributes.map(a => `<span class="bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-full text-[10px] font-black uppercase">${a}</span>`).join('')}</div>
            `;

            const myS = calculateScore(myPlay, m.arena, myHand);
            const oppS = calculateScore(oppPlay, m.arena, isP1 ? m.p2Cards : m.p1Cards);

            document.getElementById('opp-card').innerHTML = oppPlay ? cardUI(oppPlay) : `<span class="text-slate-700 font-black text-xs animate-pulse">Scanning Grid...</span>`;
            document.getElementById('player-card').innerHTML = myPlay ? cardUI(myPlay) : `<span class="text-blue-500/30 font-black text-xs">Awaiting Command</span>`;
            document.getElementById('player-score').innerText = myS.total.toString().padStart(2, '0');
            document.getElementById('opp-score').innerText = (oppPlay && myPlay) ? oppS.total.toString().padStart(2, '0') : '??';

            const status = document.getElementById('battle-status');
            if (!myPlay && !oppPlay) status.innerText = "SELECT UNIT";
            else if (myPlay && !oppPlay) status.innerText = "WAITING FOR ENEMY";
            else if (!myPlay && oppPlay) status.innerText = "ENEMY READY";
            else status.innerText = "RESOLVING...";

            const alertBox = document.getElementById('round-alert');
            if (myPlay && myS.special) { alertBox.innerText = `Special Activated: ${myS.special}`; alertBox.classList.remove('hidden'); }
            else { alertBox.classList.add('hidden'); }

            if (!myPlay && !m.winner) {
                document.getElementById('hand-cards').innerHTML = myHand.map((c, i) => `
                    <div onclick="deployCard(${i})" class="flex-shrink-0 w-36 glass p-4 rounded-2xl cursor-pointer hover:border-blue-500 border-slate-800 card-enter">
                        <p class="text-[8px] text-blue-500 font-black uppercase">${c.type}</p>
                        <p class="text-[10px] font-black uppercase truncate">${c.name}</p>
                        <div class="mt-2 text-[8px] opacity-40">Stats: ${Object.values(c.stats).reduce((a,b)=>a+b)}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('hand-cards').innerHTML = `<p class="text-slate-500 text-xs font-black uppercase animate-pulse">Syncing Tactical Grid...</p>`;
            }

            if (isP1 && m.p1Played && m.p2Played && !m.resolving) resolveRound(m);

            if (m.winner) {
                const out = document.getElementById('match-outcome');
                out.classList.remove('hidden');
                out.innerText = m.winner === currentUser.uid ? 'CAMPAIGN VICTORY' : 'DEFEAT';
                if (m.winner === currentUser.uid) {
                    const finalCollection = isP1 ? m.p1Cards : m.p2Cards;
                    updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data'), { cards: finalCollection });
                }
                setTimeout(() => { if (isP1 && activeMatchId) deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', activeMatchId)); }, 8000);
            }
        }

        function cardUI(c) {
            return `<div class="text-center p-4 h-full flex flex-col justify-center card-enter">
                <p class="text-[10px] text-blue-500 font-black mb-2 uppercase">${c.type}</p>
                <h5 class="text-xl font-game font-black leading-tight uppercase mb-4">${c.name}</h5>
                <div class="text-[8px] text-yellow-500 font-bold border-t border-slate-800 pt-4 mt-auto uppercase tracking-widest">${c.special}</div>
            </div>`;
        }

        window.deployCard = async (i) => {
            const isP1 = activeMatchId.startsWith(currentUser.uid);
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', activeMatchId);
            const mSnap = await getDoc(mRef);
            if (!mSnap.exists()) return;
            const hand = isP1 ? mSnap.data().p1Cards : mSnap.data().p2Cards;
            await updateDoc(mRef, { [isP1 ? 'p1Played' : 'p2Played']: hand[i] });
        };

        async function resolveRound(m) {
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', activeMatchId);
            await updateDoc(mRef, { resolving: true });
            
            const s1 = calculateScore(m.p1Played, m.arena, m.p1Cards).total;
            const s2 = calculateScore(m.p2Played, m.arena, m.p2Cards).total;
            
            let p1Cards = [...m.p1Cards], p2Cards = [...m.p2Cards];
            if (s1 > s2) { p1Cards.push(m.p2Played); p2Cards = p2Cards.filter(c => c.instanceId !== m.p2Played.instanceId); }
            else if (s2 > s1) { p2Cards.push(m.p1Played); p1Cards = p1Cards.filter(c => c.instanceId !== m.p1Played.instanceId); }

            setTimeout(async () => {
                const winner = p1Cards.length === 0 ? m.p2 : (p2Cards.length === 0 ? m.p1 : null);
                if (winner) {
                    await updateDoc(mRef, { winner, p1Cards, p2Cards, resolving: false });
                    await updateDoc(doc(db, 'artifacts', appId, 'users', winner, 'profile', 'data'), { wins: increment(1) });
                } else {
                    await updateDoc(mRef, {
                        p1Cards, p2Cards, p1Played: null, p2Played: null, resolving: false,
                        arena: ARENAS[Math.floor(Math.random() * ARENAS.length)], round: increment(1)
                    });
                }
            }, 3000);
        }

        function renderVault() {
            document.getElementById('vault-grid').innerHTML = myCollection.map(c => `
                <div class="glass p-8 rounded-[2rem] border-slate-800 hover:border-blue-500/50 transition-all">
                    <p class="text-[10px] font-black text-blue-500 uppercase">${c.type}</p>
                    <h5 class="text-xl font-game font-black uppercase mb-4">${c.name}</h5>
                    <div class="grid grid-cols-2 gap-2 opacity-50 text-[8px] font-black uppercase">
                        ${Object.entries(c.stats).map(([k,v]) => `<span>${k}: ${v}</span>`).join('')}
                    </div>
                    <p class="mt-4 text-[9px] text-yellow-500/80 font-bold italic tracking-widest">${c.special}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
