<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlefield Clash Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .gradient-border {
            background: linear-gradient(to bottom right, #3b82f6, #8b5cf6);
            padding: 2px;
            border-radius: 0.75rem;
        }
        
        .card-container { position: relative; }
        .stats-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }
        .card-container:hover .stats-tooltip {
            visibility: visible;
            opacity: 1;
        }
        .stat-grid {
            display: grid;
            grid-template-cols: 1fr auto;
            gap: 2px 8px;
            font-size: 10px;
        }
        
        #game-screen { overflow: visible; padding-bottom: 120px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div id="game-container" class="w-full max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                BATTLEFIELD CLASH ONLINE
            </h1>
            <div id="user-info" class="text-[10px] text-slate-500 mt-1 uppercase tracking-widest font-bold">Connecting...</div>
            <p id="game-status" class="text-slate-400 mt-2">Connecting to game servers...</p>
        </header>

        <div id="game-screen">
            <!-- Dynamic Content -->
            <div class="flex flex-col items-center justify-center py-20">
                <div class="spinner mb-4"></div>
                <p>Establishing secure connection...</p>
            </div>
        </div>
    </div>

    <div id="log-container" class="fixed bottom-4 right-4 w-64 max-h-48 overflow-y-auto bg-black/50 p-3 rounded-lg text-xs text-slate-300 border border-white/10 hidden">
        <div class="font-bold mb-1 border-b border-white/10 pb-1">Battle Log</div>
        <div id="game-log"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, query, where, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Game Configuration
        const CARDS_DATA = [
            { name: "Ground Graveler", type: "Nature", level: 1, special: "Focused Training", stats: { strength: 5, speed: 15, agility: 14, health: 7, intelligence: 6, creativity: 13, accuracy: 10, stamina: 12, skill: 8, strategy: 10 } },
            { name: "Tiny", type: "Nature", level: 1, special: "Underdog Mentality", stats: { strength: 6, speed: 16, agility: 19, health: 7, intelligence: 9, creativity: 12, accuracy: 8, stamina: 10, skill: 8, strategy: 5 } },
            { name: "Vine Thrasher", type: "Nature", level: 2, special: "Set My Own Rules", stats: { strength: 16, speed: 7, agility: 11, health: 8, intelligence: 12, creativity: 11, accuracy: 4, stamina: 9, skill: 14, strategy: 13 } },
            { name: "Bush Beast", type: "Nature", level: 2, special: "Reinforcements", stats: { strength: 7, speed: 16, agility: 13, health: 4, intelligence: 6, creativity: 14, accuracy: 12, stamina: 8, skill: 7, strategy: 18 } },
            { name: "Villager", type: "Village", level: 1, special: "Battle Ready", stats: { strength: 7, speed: 12, agility: 11, health: 15, intelligence: 11, creativity: 9, accuracy: 10, stamina: 13, skill: 7, strategy: 5 } },
            { name: "Realo", type: "Village", level: 1, special: "Rescue Mission", stats: { strength: 10, speed: 9, agility: 9, health: 8, intelligence: 13, creativity: 13, accuracy: 8, stamina: 11, skill: 8, strategy: 11 } },
            { name: "Warrior", type: "Village", level: 2, special: "Bonus Training", stats: { strength: 18, speed: 13, agility: 8, health: 8, intelligence: 5, creativity: 7, accuracy: 12, stamina: 13, skill: 12, strategy: 9 } },
            { name: "Target Shielder", type: "Village", level: 2, special: "Narrow It Down", stats: { strength: 4, speed: 9, agility: 6, health: 22, intelligence: 5, creativity: 7, accuracy: 17, stamina: 12, skill: 8, strategy: 15 } }
        ];

        const BATTLEFIELDS = [
            { name: "Jungle Fortress", type: "Nature", attrs: ["agility", "skill", "creativity"] },
            { name: "Underground Den", type: "Nature", attrs: ["stamina", "strategy", "speed"] },
            { name: "Tower Takedown", type: "Village", attrs: ["intelligence", "skill", "accuracy"] },
            { name: "Town Center", type: "Village", attrs: ["strength", "health", "speed"] }
        ];

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC7J4szfCMOiVMl7P8kiy2XqE_bYlQvMoI",
            authDomain: "triplepower-8dca6.firebaseapp.com",
            projectId: "triplepower-8dca6",
            storageBucket: "triplepower-8dca6.firebasestorage.app",
            messagingSenderId: "73414403539",
            appId: "1:73414403539:web:d54faef95d2709a78e3b26"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'triplepower-default';

        // Local State
        let currentUser = null;
        let gameId = null;
        let gameData = null;
        let playerRole = null; // 'p0' or 'p1'
        let matchmakingListener = null;

        const screen = document.getElementById('game-screen');
        const statusText = document.getElementById('game-status');
        const userInfo = document.getElementById('user-info');
        const gameLog = document.getElementById('game-log');
        const logContainer = document.getElementById('log-container');

        // --- AUTHENTICATION ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error", err);
                statusText.innerText = "Connection failed. Please refresh.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userInfo.innerText = `Logged in as: ${user.uid}`;
                renderMainMenu();
            }
        });

        // --- UI UTILS ---
        function addLog(msg) {
            const div = document.createElement('div');
            div.className = "mb-1 border-l-2 border-blue-500 pl-2";
            div.innerText = msg;
            gameLog.prepend(div);
            logContainer.classList.remove('hidden');
        }

        function createStatsHTML(stats) {
            return `
                <div class="stats-tooltip">
                    <div class="text-[9px] font-bold text-blue-400 mb-1 border-b border-white/10 pb-1 uppercase">Attribute Stats</div>
                    <div class="stat-grid">
                        ${Object.entries(stats).map(([key, val]) => `
                            <span class="capitalize text-slate-400">${key}</span>
                            <span class="font-bold text-white">${val}</span>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- MATCHMAKING ---
        async function startMatchmaking() {
            statusText.innerText = "Searching for an opponent...";
            screen.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="spinner mb-6"></div>
                    <p class="text-xl font-bold animate-pulse">Searching for match...</p>
                    <button id="cancel-match" class="mt-8 text-slate-500 hover:text-white underline text-sm">Cancel</button>
                </div>
            `;

            document.getElementById('cancel-match').onclick = () => renderMainMenu();

            const lobbyRef = collection(db, 'artifacts', appId, 'public', 'data', 'lobby');
            
            // Look for existing lobby
            // RULE 2: No complex queries, just get open lobbies
            const lobbiesSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game'));
            const lobbyData = lobbiesSnap.data();

            if (lobbyData && lobbyData.hostId !== currentUser.uid && lobbyData.status === 'waiting') {
                // Join existing game
                gameId = lobbyData.gameId;
                playerRole = 'p1';
                
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game'), {
                    status: 'filled'
                });
                
                await joinGame(gameId);
            } else {
                // Host new game
                gameId = `game_${Date.now()}_${currentUser.uid}`;
                playerRole = 'p0';

                const newGame = {
                    id: gameId,
                    status: 'drafting',
                    createdAt: Date.now(),
                    players: [
                        { uid: currentUser.uid, name: "Player 1", hand: [], lastLostCard: null },
                        { uid: null, name: "Player 2", hand: [], lastLostCard: null }
                    ],
                    pool: [...CARDS_DATA].sort(() => Math.random() - 0.5),
                    draftOrder: [0, 1, 1, 0, 0, 1, 1, 0].map(i => i), // Simplified draft
                    draftStep: 0,
                    activeCards: [null, null],
                    winnerInPlayIdx: null,
                    battlefield: null,
                    battleResults: null,
                    turn: 0,
                    logs: []
                };

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), newGame);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game'), {
                    gameId: gameId,
                    hostId: currentUser.uid,
                    status: 'waiting'
                });

                watchGame(gameId);
            }
        }

        async function joinGame(id) {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', id);
            const snap = await getDoc(gameRef);
            let data = snap.data();
            data.players[1].uid = currentUser.uid;
            await updateDoc(gameRef, { players: data.players });
            watchGame(id);
        }

        function watchGame(id) {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', id), (snapshot) => {
                if (!snapshot.exists()) return;
                gameData = snapshot.data();
                processGameState();
            }, (err) => console.error("Game listener error", err));
        }

        // --- GAME LOGIC ENGINE ---
        function processGameState() {
            if (gameData.status === 'drafting') {
                renderDraft();
            } else if (gameData.status === 'battle_selection') {
                renderBattleSelection();
            } else if (gameData.status === 'battle_result') {
                renderResultUI();
            } else if (gameData.status === 'finished') {
                renderEndGame();
            }
        }

        function renderMainMenu() {
            screen.innerHTML = `
                <div class="text-center py-12">
                    <div class="bg-slate-800 p-10 rounded-3xl border border-white/10 shadow-2xl">
                        <h2 class="text-2xl font-bold mb-6">Ready for Battle?</h2>
                        <button id="find-match-btn" class="px-12 py-5 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-full font-black text-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                            FIND ONLINE MATCH
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('find-match-btn').onclick = startMatchmaking;
            statusText.innerText = "Connect with a player to begin.";
        }

        function renderDraft() {
            const pIndex = gameData.draftOrder[gameData.draftStep];
            const isMyTurn = (pIndex === 0 && playerRole === 'p0') || (pIndex === 1 && playerRole === 'p1');
            
            statusText.innerText = isMyTurn ? "YOUR TURN TO PICK" : "WAITING FOR OPPONENT TO PICK";

            screen.innerHTML = `
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    ${gameData.pool.map((card, idx) => `
                        <div class="card-container">
                            <div onclick="${isMyTurn ? `pickCard(${idx})` : ''}" class="gradient-border ${isMyTurn ? 'cursor-pointer hover:-translate-y-1' : 'opacity-50 grayscale cursor-not-allowed'} transition-all">
                                <div class="bg-slate-800 p-3 rounded-lg h-full">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-white/10">${card.type}</span>
                                        <span class="text-[10px] font-bold text-yellow-500">LVL ${card.level}</span>
                                    </div>
                                    <h3 class="font-bold text-sm truncate">${card.name}</h3>
                                    <p class="text-[9px] text-slate-400 mt-1 italic">${card.special}</p>
                                </div>
                            </div>
                            ${createStatsHTML(card.stats)}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.pickCard = async (idx) => {
            const pIdx = gameData.draftOrder[gameData.draftStep];
            const card = gameData.pool[idx];
            
            const newPool = [...gameData.pool];
            newPool.splice(idx, 1);
            
            const newPlayers = [...gameData.players];
            newPlayers[pIdx].hand.push(card);

            const nextStep = gameData.draftStep + 1;
            let nextStatus = 'drafting';
            let nextBattlefield = null;

            if (nextStep >= gameData.draftOrder.length) {
                nextStatus = 'battle_selection';
                nextBattlefield = BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)];
            }

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                pool: newPool,
                players: newPlayers,
                draftStep: nextStep,
                status: nextStatus,
                battlefield: nextBattlefield
            });
        };

        function renderBattleSelection() {
            const myIdx = playerRole === 'p0' ? 0 : 1;
            const oppIdx = 1 - myIdx;

            const myCardSelected = gameData.activeCards[myIdx] !== null;
            const oppCardSelected = gameData.activeCards[oppIdx] !== null;

            if (myCardSelected && oppCardSelected) {
                // Host resolves the battle logic to ensure single source of truth
                if (playerRole === 'p0') resolveBattle();
                return;
            }

            statusText.innerText = myCardSelected ? "Waiting for opponent's selection..." : "SELECT YOUR CHAMPION";

            const field = gameData.battlefield;
            const myPlayer = gameData.players[myIdx];

            screen.innerHTML = `
                <div class="mb-6 p-6 bg-slate-800/80 rounded-xl border border-white/10 text-center shadow-2xl">
                    <div class="inline-block px-3 py-1 mb-2 rounded-full text-[10px] font-bold tracking-widest uppercase bg-blue-500/20 text-blue-300 border border-blue-500/30">
                        ${field.type} Battlefield
                    </div>
                    <h2 class="text-3xl font-black text-white mb-2">${field.name}</h2>
                    <div class="flex justify-center gap-2">
                        ${field.attrs.map(a => `<span class="px-2 py-1 bg-white/5 rounded text-xs font-mono text-slate-300 capitalize border border-white/5">${a}</span>`).join('')}
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    ${myCardSelected ? `
                        <div class="p-8 text-center bg-blue-500/10 rounded-xl border border-blue-500/20 animate-pulse">
                            <p class="font-bold text-blue-400">YOU HAVE DEPLOYED YOUR UNIT</p>
                            <p class="text-xs text-slate-500">Awaiting your opponent's move...</p>
                        </div>
                    ` : `
                        <div class="flex flex-wrap justify-center gap-4">
                            ${myPlayer.hand.map((card, idx) => `
                                <div class="card-container">
                                    <div onclick="selectCardForBattle(${idx})" class="w-36 bg-slate-800 p-4 rounded-xl border-2 border-transparent hover:border-blue-500 cursor-pointer transition-all hover:scale-105 shadow-lg">
                                        <div class="flex justify-between items-center mb-2">
                                            <span class="text-[9px] font-bold text-slate-500 px-1.5 py-0.5 bg-white/5 rounded">${card.type}</span>
                                            <span class="text-[9px] font-black text-yellow-600">L${card.level}</span>
                                        </div>
                                        <div class="text-sm font-bold truncate mb-1">${card.name}</div>
                                        <div class="text-[8px] leading-tight text-slate-400 italic">${card.special}</div>
                                    </div>
                                    ${createStatsHTML(card.stats)}
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        window.selectCardForBattle = async (cardIdx) => {
            const myIdx = playerRole === 'p0' ? 0 : 1;
            const newPlayers = [...gameData.players];
            const activeCards = [...gameData.activeCards];
            
            const card = newPlayers[myIdx].hand.splice(cardIdx, 1)[0];
            activeCards[myIdx] = card;

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                players: newPlayers,
                activeCards: activeCards
            });
        };

        // Battle Resolution Logic (Server-side simulation on host client)
        async function resolveBattle() {
            const field = gameData.battlefield;
            const card0 = gameData.activeCards[0];
            const card1 = gameData.activeCards[1];
            
            let activeBattleAttrs = [...field.attrs];
            let globalLogs = [];

            [card0, card1].forEach((card, i) => {
                if (card.type === field.type) {
                    if (card.special === "Narrow It Down") {
                        let weakestBattleAttr = activeBattleAttrs[0];
                        activeBattleAttrs.forEach(a => {
                            if (card.stats[a] < card.stats[weakestBattleAttr]) weakestBattleAttr = a;
                        });
                        activeBattleAttrs = activeBattleAttrs.filter(a => a !== weakestBattleAttr);
                        globalLogs.push(`${card.name} used Narrow It Down!`);
                    }
                    if (card.special === "Set My Own Rules") {
                        const nonBattleAttrs = Object.keys(card.stats).filter(a => !activeBattleAttrs.includes(a));
                        let bestOutsideAttr = nonBattleAttrs[0];
                        nonBattleAttrs.forEach(a => {
                            if (card.stats[a] > card.stats[bestOutsideAttr]) bestOutsideAttr = a;
                        });
                        activeBattleAttrs.push(bestOutsideAttr);
                        globalLogs.push(`${card.name} used Set My Own Rules!`);
                    }
                }
            });

            let results = [{ card: card0, score: 0, log: [] }, { card: card1, score: 0, log: [] }];
            activeBattleAttrs.forEach(attr => {
                results[0].score += card0.stats[attr];
                results[1].score += card1.stats[attr];
            });

            results.forEach((res, i) => {
                const card = res.card;
                if (card.type === field.type) {
                    switch(card.special) {
                        case "Focused Training":
                            const weakest = Object.keys(card.stats).reduce((a, b) => card.stats[a] < card.stats[b] ? a : b);
                            if (activeBattleAttrs.includes(weakest)) { res.score += 5; res.log.push(`Focused (+5)`); }
                            break;
                        case "Underdog Mentality":
                            if (card.level < gameData.activeCards[1-i].level) { res.score += 2; res.log.push(`Underdog (+2)`); }
                            break;
                        case "Battle Ready":
                            res.score += activeBattleAttrs.length; res.log.push(`Ready (+${activeBattleAttrs.length})`);
                            break;
                        case "Reinforcements":
                            const teamCount = gameData.players[i].hand.filter(c => c.type === card.type).length;
                            res.score += teamCount; res.log.push(`Reinforced (+${teamCount})`);
                            break;
                        case "Bonus Training":
                            const strongest = Object.keys(card.stats).reduce((a, b) => card.stats[a] > card.stats[b] ? a : b);
                            if (activeBattleAttrs.includes(strongest)) { res.score += 5; res.log.push(`Bonus (+5)`); }
                            break;
                    }
                }
            });

            const winnerIdx = results[0].score >= results[1].score ? 0 : 1;
            const loserIdx = 1 - winnerIdx;

            const loserCard = gameData.activeCards[loserIdx];
            const newPlayers = [...gameData.players];
            newPlayers[winnerIdx].hand.push(loserCard);
            newPlayers[loserIdx].lastLostCard = loserCard;

            // Final state check: Game Over?
            let gameStatus = 'battle_result';
            if (newPlayers[loserIdx].hand.length === 0) {
                gameStatus = 'finished';
            }

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                status: gameStatus,
                players: newPlayers,
                battleResults: {
                    scores: [results[0].score, results[1].score],
                    winnerIdx,
                    attrs: activeBattleAttrs,
                    globalLogs,
                    logs: [results[0].log, results[1].log]
                }
            });
        }

        function renderResultUI() {
            const res = gameData.battleResults;
            statusText.innerText = "CLASH COMPLETE";

            screen.innerHTML = `
                <div class="mb-6 text-center">
                    <div class="inline-block px-4 py-2 bg-slate-800 rounded-lg border border-white/10">
                        <span class="text-[10px] text-slate-400 block uppercase font-bold tracking-widest mb-1">Final Attributes Used</span>
                        <div class="flex justify-center gap-2">
                            ${res.attrs.map(a => `<span class="text-xs font-mono text-blue-300 capitalize">${a}</span>`).join(' • ')}
                        </div>
                    </div>
                </div>

                <div class="flex justify-between gap-6 mb-8 max-w-2xl mx-auto">
                    <div class="flex-1 bg-slate-800 p-6 rounded-2xl border-4 ${res.winnerIdx === 0 ? 'border-green-500 shadow-green-500/20' : 'border-red-900/50'}">
                        <div class="text-center font-bold text-xl mb-4">${gameData.activeCards[0].name}</div>
                        <div class="text-6xl font-black text-center text-blue-400">${res.scores[0]}</div>
                    </div>
                    <div class="flex items-center text-3xl font-black italic text-slate-600">VS</div>
                    <div class="flex-1 bg-slate-800 p-6 rounded-2xl border-4 ${res.winnerIdx === 1 ? 'border-green-500 shadow-green-500/20' : 'border-red-900/50'}">
                        <div class="text-center font-bold text-xl mb-4">${gameData.activeCards[1].name}</div>
                        <div class="text-6xl font-black text-center text-purple-400">${res.scores[1]}</div>
                    </div>
                </div>
                
                <div class="text-center">
                    <div class="text-3xl font-black mb-4">Player ${res.winnerIdx + 1} Wins Round!</div>
                    ${playerRole === 'p0' ? `
                        <button onclick="nextRound()" class="bg-blue-600 hover:bg-blue-700 px-12 py-4 rounded-full font-bold text-lg shadow-lg">Next Battlefield</button>
                    ` : `
                        <p class="text-slate-400 animate-pulse">Host is picking next battlefield...</p>
                    `}
                </div>
            `;
        }

        window.nextRound = async () => {
            const winnerIdx = gameData.battleResults.winnerIdx;
            const newActive = [null, null];
            newActive[winnerIdx] = gameData.activeCards[winnerIdx];

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                status: 'battle_selection',
                activeCards: newActive,
                battlefield: BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)],
                battleResults: null
            });
        };

        function renderEndGame() {
            const winnerIdx = gameData.battleResults.winnerIdx;
            screen.innerHTML = `
                <div class="text-center py-12">
