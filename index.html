    <style>
        /* Card Flip Animation Styles */
.card-flipper-container { 
    perspective: 1000px; 
    height: 420px; /* Increased height to fit all elements comfortably */
}

.card-flipper-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    cursor: pointer;
}

.card-flipper-inner.is-flipped {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    top: 0;
    left: 0;
}

.card-back {
    transform: rotateY(180deg);
}
        .particle {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    border-radius: 50%;
    filter: blur(1px);
}

@keyframes particle-float {
    0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
}
        @keyframes clash-shake {
    0% { transform: scale(1); }
    20% { transform: scale(1.2) rotate(3deg); }
    40% { transform: scale(1.2) rotate(-3deg); }
    60% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0); }
}

@keyframes winner-glow {
    0% { box-shadow: 0 0 0px rgba(34, 197, 94, 0); }
    50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
    100% { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
}

@keyframes score-pop {
    0% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
}

/* Dramatic Classes */
.animate-clash-shake { animation: clash-shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
.animate-winner-ready { animation: winner-glow 1.5s ease-in-out infinite alternate; animation-delay: 1.2s; }
.animate-score-reveal { animation: score-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        
@keyframes slideInLeft {
    from { transform: translateX(-100px) rotate(-5deg); opacity: 0; }
    to { transform: translateX(0) rotate(0); opacity: 1; }
}

@keyframes slideInRight {
    from { transform: translateX(100px) rotate(5deg); opacity: 0; }
    to { transform: translateX(0) rotate(0); opacity: 1; }
}

@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

/* Application Classes */
.animate-slide-left { animation: slideInLeft 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.animate-slide-right { animation: slideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.animate-pop { animation: popIn 0.4s ease-out forwards; }

/* Makes cards lift up when you hover over them in your hand */
.hand-card-hover:hover {
    transform: translateY(-15px) scale(1.05);
    z-index: 50;
    transition: all 0.2s ease-out;
}

        // --- AUTHENTICATION ---
onAuthStateChanged(auth, async (user) => {
    const authOverlay = document.getElementById('auth-overlay');
    if (user && user.email) {
        currentUser = user;
        
        // Fetch or Initialize User Data from Firestore
        const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
        const userSnap = await getDoc(userDocRef);
        
        if (!userSnap.exists()) {
            // New user initialization
            currentUser.xp = 0;
            await setDoc(userDocRef, { xp: 0, name: user.displayName || user.email.split('@')[0] });
        } else {
            currentUser.xp = userSnap.data().xp || 0;
        }

        authOverlay.classList.add('hidden');
        const displayName = user.displayName || user.email.split('@')[0];
        userInfo.innerText = `Logged in as: ${displayName}`;
        window.renderMainMenu();
    } else {
        currentUser = null;
        authOverlay.classList.remove('hidden');
        screen.innerHTML = '';
        statusText.innerText = "Connect with a player to begin.";
    }
});

window.handleAuth = async (type) => {
    const username = document.getElementById('auth-username').value;
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const errorEl = document.getElementById('auth-error');
    
    errorEl.classList.add('hidden');

    // Validation
    if (!email || !password || (type === 'signup' && !username)) {
        errorEl.innerText = "Please fill in all required fields.";
        errorEl.classList.remove('hidden');
        return;
    }

    try {
        if (type === 'signup') {
            // 1. Create the user
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            // 2. Immediately attach the username to the profile
            await updateProfile(userCredential.user, {
                displayName: username
            });
            // Refresh to ensure onAuthStateChanged picks up the name
            location.reload(); 
        } else {
            await signInWithEmailAndPassword(auth, email, password);
        }
    } catch (error) {
        let msg = error.code === 'auth/invalid-credential' 
            ? "Incorrect email or password." 
            : error.message.replace('Firebase: ', '');
        errorEl.innerText = msg;
        errorEl.classList.remove('hidden');
    }
};

function updateEnvironment() {
    // Remove old particles first
    document.querySelectorAll('.particle').forEach(p => p.remove());

    if (!gameData || !gameData.battlefield) return;

    const fieldType = gameData.battlefield.type; // 'Nature' or 'Village'

        p.style.width = size;

        async function resolveBattle() {
    // 1. Safety Check: Ensure game data is loaded
    if (!gameData || !gameData.activeCards || !gameData.battlefield) {
        console.error("Missing game data for battle");
        return;
    }

    const field = gameData.battlefield;
    const card0 = gameData.activeCards[0];
    const card1 = gameData.activeCards[1];
    
    if (!card0 || !card1) return;

    // 2. Setup Variables
    let activeBattleAttrs = [...field.attrs];
    let activations = ["", ""]; 
    let finalScores = [0, 0];

    // --- PHASE 1: FIELD MODIFICATION (Narrow It Down - Village Only) ---
    [card0, card1].forEach((card, i) => {
        // Standard Check: Type must match field type
        const typeMatches = (card.type === field.type);
        
        if (typeMatches && card.special === "Narrow It Down") {
            let weakest = activeBattleAttrs.reduce((prev, curr) => 
                (card.stats[curr] || 0) < (card.stats[prev] || 0) ? curr : prev
            );
            activeBattleAttrs = activeBattleAttrs.filter(a => a !== weakest);
            activations[i] = `Special: ${weakest.toUpperCase()} dropped!`;
        }
    });

    // --- PHASE 2: SCORE CALCULATION & TYPE-GATED SPECIALS ---
    [card0, card1].forEach((card, i) => {
        const oppIdx = 1 - i;
        const oppCard = [card0, card1][oppIdx];
        const typeMatches = (card.type === field.type);
        
        // 1. Calculate Base Score (Everyone gets this)
        activeBattleAttrs.forEach(attr => { 
            finalScores[i] += (card.stats[attr] || 0); 
        });

        // 2. ONLY run specials if the card type matches the battlefield type
        if (typeMatches && card.special) {
            
            // FOCUSED TRAINING (Nature)
            if (card.special === "Focused Training") {
                finalScores[i] += 2;
                activations[i] = "Special: +2 attribute total!";
            }
            
            // UNDERDOG MENTALITY (Nature)
            else if (card.special === "Underdog Mentality" && card.level < oppCard.level) {
                finalScores[i] += 5;
                activations[i] = "Special: +5 Underdog bonus!";
            }

            // SET MY OWN RULES (Nature)
            else if (card.special === "Set My Own Rules") {
                let otherAttrs = Object.keys(card.stats).filter(a => !activeBattleAttrs.includes(a) && a !== "Total" && typeof card.stats[a] === 'number');
                if (otherAttrs.length > 0) {
                    let bestAttr = otherAttrs.reduce((a, b) => card.stats[a] > card.stats[b] ? a : b);
                    finalScores[i] += card.stats[bestAttr];
                    finalScores[oppIdx] += (oppCard.stats[bestAttr] || 0);
                    activations[i] = `Rules Set: Added ${bestAttr.toUpperCase()}!`;
                }
            }

            // REINFORCEMENTS (Nature)
            else if (card.special === "Reinforcements") {
                const sameTypeCount = gameData.players[i].hand.filter(c => c.type === card.type).length;
                finalScores[i] += sameTypeCount;
                activations[i] = `Special: +${sameTypeCount} Reinforcements!`;
            }

            // BATTLE READY (Village)
            else if (card.special === "Battle Ready") {
                finalScores[i] += activeBattleAttrs.length;
                activations[i] = "Special: All attributes +1!";
            }

            // RESCUE MISSION (Village)
            else if (card.special === "Rescue Mission") {
                finalScores[i] -= 3;
                activations[i] = "RESCUE: Regaining lost ally (-3 score)";
            }

            // BONUS TRAINING (Village)
            else if (card.special === "Bonus Training") {
                let strongest = Object.keys(card.stats).filter(a => a !== "Total")
                    .reduce((a, b) => (card.stats[a] || 0) > (card.stats[b] || 0) ? a : b);
                finalScores[i] += 5;
                activations[i] = `Special: +5 bonus (${strongest})!`;
            }
        }
    });

    // --- PHASE 3: UPDATING FIREBASE ---
    const winnerIdx = finalScores[0] >= finalScores[1] ? 0 : 1;
    const loserIdx = 1 - winnerIdx;
    
    // SAFE COPY OF PLAYERS
    let newPlayers = gameData.players.map(p => ({
        ...p,
        hand: Array.isArray(p.hand) ? [...p.hand] : []
    }));

    // Standard card transfer
    const cardWon = gameData.activeCards[loserIdx];
    newPlayers[winnerIdx].hand.push(cardWon);

    // Rescue Mission Check
    [0, 1].forEach(i => {
        if (activations[i] && activations[i].includes("RESCUE")) {
            const oppIdx = 1 - i;
            if (newPlayers[oppIdx].hand.length > 1) { // Ensure they have a card other than the one just lost
                const regainedCard = newPlayers[oppIdx].hand.pop();
                newPlayers[i].hand.push(regainedCard);
            }
        }
    });

    let nextStatus = 'battle_result';

    try {
        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
        await updateDoc(gameRef, {
            status: nextStatus,
            players: newPlayers,
            battleResults: {
                scores: finalScores,
                winnerIdx,
                attrs: activeBattleAttrs,
                activations: activations
            }
        });
    } catch (err) {
        console.error("Firebase Update Error:", err);
        alert("Connection failed. Check your internet or Firebase rules.");
    }
}

async function grantMatchXP(isWinner) {
    const xpToAdd = isWinner ? 3 : 1;
    const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid);
    
    currentUser.xp += xpToAdd;
    
    await updateDoc(userDocRef, {
        xp: currentUser.xp
    });
}

    const isLastRound = gameData.players[0].hand.length === 0 || gameData.players[1].hand.length === 0;

const winnerName = gameData.players[res.winnerIdx].name || `Player ${res.winnerIdx + 1}`;
            
    screen.innerHTML = `

                <div class="text-xs text-yellow-500 uppercase tracking-[0.4em] font-black mb-2 animate-pulse">

            <div class="flex justify-between items-center gap-4 mb-8 overflow-hidden py-4">

                    <div class="text-[10px] font-black text-blue-400 mb-1 uppercase tracking-widest">
    ${gameData.players[0].name}
</div>

                    <div class="text-center font-bold mb-1 opacity-50 text-[10px] uppercase tracking-widest">${gameData.activeCards[0].name}</div>
                    
                    <div class="animate-score-reveal" style="animation-delay: 0.8s">
                        <div class="text-5xl font-black text-center text-blue-400 mb-1">${res.scores[0]}</div>
                    </div>

                    ${res.activations[0] ? `
                        <div class="animate-pop mt-2 p-2 bg-blue-500/10 border border-blue-500/20 rounded text-[9px] text-blue-300 italic text-center" style="animation-delay: 1.2s">
                            ✨ ${res.activations[0]}
                        </div>
                    ` : ''}
                </div>

                <div class="text-4xl font-black italic text-slate-800 animate-pop" style="animation-delay: 0.3s">VS</div>

                <div class="flex-1 bg-slate-800 p-4 rounded-2xl border-4 animate-slide-right animate-clash-shake 
                    ${res.winnerIdx === 1 ? 'border-green-500 animate-winner-ready shadow-2xl shadow-green-500/20' : 'border-slate-700 opacity-40'}">
                    <div class="text-[10px] font-black text-purple-400 mb-1 uppercase tracking-widest">
    ${gameData.players[1].name}
</div>
                    <img src="${gameData.activeCards[1].image}" class="w-full h-32 object-contain bg-slate-900/50 rounded-xl mb-3 border border-white/5">
                    <div class="text-center font-bold mb-1 opacity-50 text-[10px] uppercase tracking-widest">${gameData.activeCards[1].name}</div>
                    
                    <div class="animate-score-reveal" style="animation-delay: 1s">
                        <div class="text-5xl font-black text-center text-purple-400 mb-1">${res.scores[1]}</div>
                    </div>

                    ${res.activations[1] ? `
                        <div class="animate-pop mt-2 p-2 bg-purple-500/10 border border-purple-500/20 rounded text-[9px] text-purple-300 italic text-center" style="animation-delay: 1.4s">
                            ✨ ${res.activations[1]}
                        </div>
                    ` : ''}
                </div>
            </div>

            <div class="text-center animate-pop" style="animation-delay: 1s">
                <div class="text-3xl font-black text-white mb-8 uppercase">
    ${winnerName} WINS THE ROUND!
</div>
                
                ${playerRole === 'p0' ? `
                    <button onclick="nextRound()" class="bg-blue-600 hover:bg-blue-500 text-white px-16 py-5 rounded-full font-black shadow-xl transition-all hover:scale-110 uppercase tracking-widest">
                        ${isLastRound ? 'Finish Match' : 'Next Battle →'}
                    </button>
                ` : `
                    <span class="text-slate-400 font-bold text-sm tracking-tighter animate-pulse">
    WAITING FOR ${gameData.players[0].name.toUpperCase()}...
</span>
                `}
            </div>
        </div>
    `;
}

        window.nextRound = async () => {
    const winnerIdx = gameData.battleResults.winnerIdx;
    
    // Check if either player has 0 cards left
    const p0HandEmpty = gameData.players[0].hand.length === 0;
    const p1HandEmpty = gameData.players[1].hand.length === 0;

    if (p0HandEmpty || p1HandEmpty) {
        // Transition to finished state
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
            status: 'finished'
        });
    } else {
        const newActive = [null, null];
        newActive[winnerIdx] = gameData.activeCards[winnerIdx];

        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
            status: 'battle_selection',
            activeCards: newActive,
            battlefield: BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)],
            battleResults: null
        });
    }
};
