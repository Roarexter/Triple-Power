<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlefield Clash Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes card-burn {
    0% { filter: brightness(1) sepia(0) saturate(1); transform: scale(1); }
    30% { filter: brightness(1.5) sepia(1) saturate(10) hue-rotate(-20deg); transform: scale(1.02); }
    60% { filter: brightness(0.2) grayscale(1); transform: scale(0.95); opacity: 0.8; }
    100% { filter: brightness(0) grayscale(1); transform: scale(0.8); opacity: 0; }
}

.animate-burn {
    animation: card-burn 1.2s ease-in forwards;
    /* We delay the burn until after the scores are revealed */
    animation-delay: 1.8s; 
}
        .particle {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    border-radius: 50%;
    filter: blur(1px);
}

@keyframes particle-float {
    0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
}
        @keyframes clash-shake {
    0% { transform: scale(1); }
    20% { transform: scale(1.2) rotate(3deg); }
    40% { transform: scale(1.2) rotate(-3deg); }
    60% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0); }
}

@keyframes winner-glow {
    0% { box-shadow: 0 0 0px rgba(34, 197, 94, 0); }
    50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
    100% { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
}

@keyframes score-pop {
    0% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
}

/* Dramatic Classes */
.animate-clash-shake { animation: clash-shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
.animate-winner-ready { animation: winner-glow 1.5s ease-in-out infinite alternate; animation-delay: 1.2s; }
.animate-score-reveal { animation: score-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        
@keyframes slideInLeft {
    from { transform: translateX(-100px) rotate(-5deg); opacity: 0; }
    to { transform: translateX(0) rotate(0); opacity: 1; }
}

@keyframes slideInRight {
    from { transform: translateX(100px) rotate(5deg); opacity: 0; }
    to { transform: translateX(0) rotate(0); opacity: 1; }
}

@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

/* Application Classes */
.animate-slide-left { animation: slideInLeft 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.animate-slide-right { animation: slideInRight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.animate-pop { animation: popIn 0.4s ease-out forwards; }

/* Makes cards lift up when you hover over them in your hand */
.hand-card-hover:hover {
    transform: translateY(-15px) scale(1.05);
    z-index: 50;
    transition: all 0.2s ease-out;
}
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .gradient-border {
            background: linear-gradient(to bottom right, #3b82f6, #8b5cf6);
            padding: 2px;
            border-radius: 0.75rem;
        }
        
        .card-container { position: relative; }
        .stats-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }
        .card-container:hover .stats-tooltip {
            visibility: visible;
            opacity: 1;
        }
        .stat-grid {
            display: grid;
            grid-template-cols: 1fr auto;
            gap: 2px 8px;
            font-size: 10px;
        }
        
        #game-screen { overflow: visible; padding-bottom: 120px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <!-- Firebase SDKs -->
    <script type="module">

        // Global Game Configuration
const CARDS_DATA = [
    { id: 'c1', name: "Ground Graveler", image: "GroundGraveler.jpeg", type: "Nature", level: 1, special: "Focused Training", stats: { strength: 5, speed: 15, agility: 14, health: 7, intelligence: 6, creativity: 13, accuracy: 10, stamina: 12, skill: 8, strategy: 10 } },
    { id: 'c2', name: "Tiny", image: "Tiny.jpeg", type: "Nature", level: 1, special: "Underdog Mentality", stats: { strength: 6, speed: 16, agility: 19, health: 7, intelligence: 9, creativity: 12, accuracy: 8, stamina: 10, skill: 8, strategy: 5 } },
    { id: 'c3', name: "Vine Thrasher", image: "VineThrasher.jpeg", type: "Nature", level: 2, special: "Set My Own Rules", stats: { strength: 16, speed: 7, agility: 11, health: 8, intelligence: 12, creativity: 11, accuracy: 4, stamina: 9, skill: 14, strategy: 13 } },
    { id: 'c4', name: "Bush Beast", image: "BushBeast.jpeg", type: "Nature", level: 2, special: "Reinforcements", stats: { strength: 7, speed: 16, agility: 13, health: 4, intelligence: 6, creativity: 14, accuracy: 12, stamina: 8, skill: 7, strategy: 18 } },
    { id: 'c5', name: "Villager", image: "Villager.jpeg", type: "Village", level: 1, special: "Battle Ready", stats: { strength: 7, speed: 12, agility: 11, health: 15, intelligence: 11, creativity: 9, accuracy: 10, stamina: 13, skill: 7, strategy: 5 } },
    { id: 'c6', name: "Realo", image: "Realo.jpeg", type: "Village", level: 1, special: "Rescue Mission", stats: { strength: 10, speed: 9, agility: 9, health: 8, intelligence: 13, creativity: 13, accuracy: 8, stamina: 11, skill: 8, strategy: 11 } },
    { id: 'c7', name: "Warrior", image: "Warrior.jpeg", type: "Village", level: 2, special: "Bonus Training", stats: { strength: 18, speed: 13, agility: 8, health: 8, intelligence: 5, creativity: 7, accuracy: 12, stamina: 13, skill: 12, strategy: 9 } },
    { id: 'c8', name: "Target Shielder", image: "TargetShielder.jpeg", type: "Village", level: 2, special: "Narrow It Down", stats: { strength: 4, speed: 9, agility: 6, health: 22, intelligence: 5, creativity: 7, accuracy: 17, stamina: 12, skill: 8, strategy: 15 } }
];

        const BATTLEFIELDS = [
            { name: "Jungle Fortress", type: "Nature", attrs: ["agility", "skill", "creativity"] },
            { name: "Underground Den", type: "Nature", attrs: ["stamina", "strategy", "speed"] },
            { name: "Tower Takedown", type: "Village", attrs: ["intelligence", "skill", "accuracy"] },
            { name: "Town Center", type: "Village", attrs: ["strength", "health", "speed"] }
        ];

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC7J4szfCMOiVMl7P8kiy2XqE_bYlQvMoI",
            authDomain: "triplepower-8dca6.firebaseapp.com",
            projectId: "triplepower-8dca6",
            storageBucket: "triplepower-8dca6.firebasestorage.app",
            messagingSenderId: "73414403539",
            appId: "1:73414403539:web:d54faef95d2709a78e3b26"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'triplepower-default';

        // Local State
        let currentUser = null;
        let gameId = null;
        let gameData = null;
        let playerRole = null; // 'p0' or 'p1'

        const screen = document.getElementById('game-screen');
        const statusText = document.getElementById('game-status');
        const userInfo = document.getElementById('user-info');
        const gameLog = document.getElementById('game-log');
        const logContainer = document.getElementById('log-container');

        // --- AUTHENTICATION ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error", err);
                statusText.innerText = "Connection failed. Please refresh.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userInfo.innerText = `Logged in as: ${user.uid}`;
                renderMainMenu();
            }
        });

        // --- UI UTILS ---
        function createStatsHTML(stats) {
            return `
                <div class="stats-tooltip">
                    <div class="text-[9px] font-bold text-blue-400 mb-1 border-b border-white/10 pb-1 uppercase">Attribute Stats</div>
                    <div class="stat-grid">
                        ${Object.entries(stats).map(([key, val]) => `
                            <span class="capitalize text-slate-400">${key}</span>
                            <span class="font-bold text-white">${val}</span>
                        `).join('')}
                    </div>
                </div>
            `;
        }

function updateBackgroundTheme() {
    if (!gameData || !gameData.battlefield) {
        document.body.style.background = "#0f172a"; // Default dark blue
        return;
    }

    const type = gameData.battlefield.type;
    
    if (type === "Nature") {
        // A deep forest green gradient
        document.body.style.background = "linear-gradient(to bottom, #064e3b, #0f172a)";
    } else if (type === "Village") {
        // A warm sunset/terracotta gradient
        document.body.style.background = "linear-gradient(to bottom, #451a03, #0f172a)";
    } else {
        document.body.style.background = "#0f172a";
    }
    
    // Smooth transition effect
    document.body.style.transition = "background 1s ease";
}

function updateEnvironment() {
    // Remove old particles first
    document.querySelectorAll('.particle').forEach(p => p.remove());

    if (!gameData || !gameData.battlefield) return;

    const fieldType = gameData.battlefield.type; // 'Nature' or 'Village'
    let color = '';
    let count = 15;

    // Set theme based on battlefield
    if (fieldType === 'Nature') {
        color = 'rgba(34, 197, 94, 0.3)'; // Green leaves/pollen
    } else if (fieldType === 'Village') {
        color = 'rgba(251, 191, 36, 0.2)'; // Golden dust/embers
    } else {
        color = 'rgba(255, 255, 255, 0.1)'; // Default white mist
    }

    const container = document.body;

    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        
        // Randomize appearance
        const size = Math.random() * 10 + 5 + 'px';
        p.style.width = size;
        p.style.height = size;
        p.style.background = color;
        
        // Randomize spawn position and animation
        p.style.left = Math.random() * 100 + 'vw';
        const duration = Math.random() * 5 + 5 + 's';
        const delay = Math.random() * 10 + 's';
        
        p.style.animation = `particle-float ${duration} linear ${delay} infinite`;
        
        container.appendChild(p);
    }
}
        
        // --- MATCHMAKING ---
        async function startMatchmaking() {
            statusText.innerText = "Searching for an opponent...";
            screen.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="spinner mb-6"></div>
                    <p class="text-xl font-bold animate-pulse">Searching for match...</p>
                    <button id="cancel-match" class="mt-8 text-slate-500 hover:text-white underline text-sm">Cancel</button>
                </div>
            `;

            document.getElementById('cancel-match').onclick = () => renderMainMenu();

            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game');
            const lobbiesSnap = await getDoc(lobbyRef);
            const lobbyData = lobbiesSnap.data();

            if (lobbyData && lobbyData.hostId !== currentUser.uid && lobbyData.status === 'waiting') {
                gameId = lobbyData.gameId;
                playerRole = 'p1';
                await updateDoc(lobbyRef, { status: 'filled' });
                await joinGame(gameId);
            } else {
                gameId = `game_${Date.now()}_${currentUser.uid}`;
                playerRole = 'p0';

                const newGame = {
                    id: gameId,
                    status: 'drafting',
                    createdAt: Date.now(),
                    players: [
                        { uid: currentUser.uid, name: "Player 1", hand: [] },
                        { uid: null, name: "Player 2", hand: [] }
                    ],
                    pool: [...CARDS_DATA].sort(() => Math.random() - 0.5),
                    draftOrder: [0, 1, 1, 0, 0, 1, 1, 0],
                    draftStep: 0,
                    activeCards: [null, null],
                    battlefield: null,
                    battleResults: null
                };

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), newGame);
                await setDoc(lobbyRef, { gameId, hostId: currentUser.uid, status: 'waiting' });
                watchGame(gameId);
            }
        }

        async function joinGame(id) {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', id);
            const snap = await getDoc(gameRef);
            let data = snap.data();
            data.players[1].uid = currentUser.uid;
            await updateDoc(gameRef, { players: data.players });
            watchGame(id);
        }

        function watchGame(id) {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', id), (snapshot) => {
                if (!snapshot.exists()) return;
                gameData = snapshot.data();
                processGameState();
            });
        }

        // --- GAME LOGIC ENGINE ---
        function processGameState() {
    // Add this line here
    updateBackgroundTheme(); 

// ADD THE TRIGGER HERE:
    updateEnvironment();
            
    if (gameData.status === 'drafting' && !gameData.players[1].uid) {
        renderWaitingForOpponent();
        return;
    }

            if (gameData.status === 'drafting') {
                renderDraft();
            } else if (gameData.status === 'battle_selection') {
                renderBattleSelection();
            } else if (gameData.status === 'battle_result') {
                renderResultUI();
            } else if (gameData.status === 'finished') {
                renderEndGame();
            }
        }

        function renderMainMenu() {
            screen.innerHTML = `
                <div class="text-center py-12">
                    <div class="bg-slate-800 p-10 rounded-3xl border border-white/10 shadow-2xl">
                        <h2 class="text-2xl font-bold mb-6">Ready for Battle?</h2>
                        <button id="find-match-btn" class="px-12 py-5 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-full font-black text-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                            FIND ONLINE MATCH
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('find-match-btn').onclick = startMatchmaking;
            statusText.innerText = "Connect with a player to begin.";
        }

        function renderWaitingForOpponent() {
            statusText.innerText = "WAITING FOR OPPONENT";
            screen.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-center">
                    <div class="relative mb-8">
                        <div class="spinner w-16 h-16 border-4"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-xs font-bold animate-pulse text-blue-400">P2?</span>
                        </div>
                    </div>
                    <h2 class="text-3xl font-black mb-2 text-white">Waiting for an opponent...</h2>
                    <p class="text-slate-400 mb-8 max-w-xs">Match created! The game will start automatically when someone joins.</p>
                    <button id="leave-lobby" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-full text-xs font-bold transition-all">
                        LEAVE LOBBY
                    </button>
                </div>
            `;
            document.getElementById('leave-lobby').onclick = async () => {
                if (playerRole === 'p0') {
                    const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game');
                    await updateDoc(lobbyRef, { status: 'cancelled' });
                }
                location.reload();
            };
        }

        function renderDraft() {
            const pIndex = gameData.draftOrder[gameData.draftStep];
            const isMyTurn = (pIndex === 0 && playerRole === 'p0') || (pIndex === 1 && playerRole === 'p1');
            
            statusText.innerText = isMyTurn ? "YOUR TURN TO PICK" : "WAITING FOR OPPONENT TO PICK";

            screen.innerHTML = `
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        ${gameData.pool.map((card, idx) => `
            <div class="card-container">
                <div onclick="${isMyTurn ? `pickCard(${idx})` : ''}" class="gradient-border ${isMyTurn ? 'cursor-pointer hover:-translate-y-1' : 'opacity-50 grayscale cursor-not-allowed'} transition-all shadow-md">
                    <div class="bg-slate-800 p-2 rounded-lg h-full flex flex-col">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-white/10 text-slate-300">${card.type}</span>
                            <span class="text-[8px] font-bold text-yellow-500">LVL ${card.level}</span>
                        </div>
                        
                        <img src="${card.image}" class="w-full h-24 object-contain bg-slate-900/50 rounded mb-1.5 border border-white/5" alt="${card.name}">
                        
                        <h3 class="font-bold text-[11px] truncate leading-tight">${card.name}</h3>
                        <p class="text-[8px] text-slate-500 mt-0.5 italic truncate">${card.special}</p>
                    </div>
                </div>
                ${createStatsHTML(card.stats)}
            </div>
        `).join('')}
    </div>
`;
        }

        window.pickCard = async (idx) => {
            const pIdx = gameData.draftOrder[gameData.draftStep];
            const card = gameData.pool[idx];
            
            const newPool = [...gameData.pool];
            newPool.splice(idx, 1);
            
            const newPlayers = [...gameData.players];
            newPlayers[pIdx].hand.push(card);

            const nextStep = gameData.draftStep + 1;
            let nextStatus = 'drafting';
            let nextBattlefield = null;

            if (nextStep >= gameData.draftOrder.length) {
                nextStatus = 'battle_selection';
                nextBattlefield = BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)];
            }

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                pool: newPool,
                players: newPlayers,
                draftStep: nextStep,
                status: nextStatus,
                battlefield: nextBattlefield
            });
        };

        function renderBattleSelection() {
            const myIdx = playerRole === 'p0' ? 0 : 1;
            const myCardSelected = gameData.activeCards[myIdx] !== null;
            const oppCardSelected = gameData.activeCards[1 - myIdx] !== null;

            if (gameData.activeCards[0] && gameData.activeCards[1]) {
                if (playerRole === 'p0') resolveBattle();
                statusText.innerText = "RESOLVING CLASH...";
                screen.innerHTML = `<div class="flex justify-center py-20"><div class="spinner"></div></div>`;
                return;
            }

            statusText.innerText = myCardSelected ? "Waiting for opponent's selection..." : "SELECT YOUR CHAMPION";
            const field = gameData.battlefield;
            const myPlayer = gameData.players[myIdx];

            screen.innerHTML = `
                <div class="mb-6 p-6 bg-slate-800/80 rounded-xl border border-white/10 text-center shadow-2xl">
                    <div class="inline-block px-3 py-1 mb-2 rounded-full text-[10px] font-bold tracking-widest uppercase bg-blue-500/20 text-blue-300 border border-blue-500/30">
                        ${field.type} Battlefield
                    </div>
                    <h2 class="text-3xl font-black text-white mb-2">${field.name}</h2>
                    <div class="flex justify-center gap-2">
                        ${field.attrs.map(a => `<span class="px-2 py-1 bg-white/5 rounded text-xs font-mono text-slate-300 capitalize border border-white/5">${a}</span>`).join('')}
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    ${myCardSelected ? `
                        <div class="p-8 text-center bg-blue-500/10 rounded-xl border border-blue-500/20 animate-pulse">
                            <p class="font-bold text-blue-400">UNIT DEPLOYED: ${gameData.activeCards[myIdx].name}</p>
                            <p class="text-xs text-slate-500 mt-2">Awaiting your opponent's move...</p>
                        </div>
                    ` : `
                        <div class="flex flex-wrap justify-center gap-4">
                            ${myPlayer.hand.map((card, idx) => `
    <div class="card-container">
   <div onclick="selectCardForBattle(${idx})" class="w-28 bg-slate-800 p-2.5 rounded-xl border-2 border-transparent hover:border-blue-500 cursor-pointer transition-all hover:scale-105 shadow-lg">
   <img src="${card.image}" class="w-full h-20 object-contain bg-slate-900/50 rounded-lg mb-2 shadow-md" alt="${card.name}">
   
    <div class="flex justify-between items-center mb-1">
        <span class="text-[8px] font-bold text-slate-500 px-1.5 py-0.5 bg-white/5 rounded">${card.type}</span>
        <span class="text-[8px] font-black text-yellow-600">L${card.level}</span>
    </div>
    <div class="text-[11px] font-bold truncate">${card.name}</div>
</div>
        ${createStatsHTML(card.stats)}
    </div>
`).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        window.selectCardForBattle = async (cardIdx) => {
            const myIdx = playerRole === 'p0' ? 0 : 1;
            const myHand = [...gameData.players[myIdx].hand];
            const selected = myHand.splice(cardIdx, 1)[0];
            
            const playersUpdate = [...gameData.players];
            playersUpdate[myIdx].hand = myHand;
            
            const activeUpdate = [...gameData.activeCards];
            activeUpdate[myIdx] = selected;

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                players: playersUpdate,
                activeCards: activeUpdate
            });
        };

        async function resolveBattle() {
    // 1. Safety Check: Ensure game data is loaded
    if (!gameData || !gameData.activeCards || !gameData.battlefield) {
        console.error("Missing game data for battle");
        return;
    }

    const field = gameData.battlefield;
    const card0 = gameData.activeCards[0];
    const card1 = gameData.activeCards[1];
    
    if (!card0 || !card1) return;

    // 2. Setup Variables
    let activeBattleAttrs = [...field.attrs];
    let activations = ["", ""]; 
    let finalScores = [0, 0];

    // --- PHASE 1: FIELD MODIFICATION (Narrow It Down - Village Only) ---
    [card0, card1].forEach((card, i) => {
        // Standard Check: Type must match field type
        const typeMatches = (card.type === field.type);
        
        if (typeMatches && card.special === "Narrow It Down") {
            let weakest = activeBattleAttrs.reduce((prev, curr) => 
                (card.stats[curr] || 0) < (card.stats[prev] || 0) ? curr : prev
            );
            activeBattleAttrs = activeBattleAttrs.filter(a => a !== weakest);
            activations[i] = `Special: ${weakest.toUpperCase()} dropped!`;
        }
    });

    // --- PHASE 2: SCORE CALCULATION & TYPE-GATED SPECIALS ---
    [card0, card1].forEach((card, i) => {
        const oppIdx = 1 - i;
        const oppCard = [card0, card1][oppIdx];
        const typeMatches = (card.type === field.type);
        
        // 1. Calculate Base Score (Everyone gets this)
        activeBattleAttrs.forEach(attr => { 
            finalScores[i] += (card.stats[attr] || 0); 
        });

        // 2. ONLY run specials if the card type matches the battlefield type
        if (typeMatches && card.special) {
            
            // FOCUSED TRAINING (Nature)
            if (card.special === "Focused Training") {
                finalScores[i] += 2;
                activations[i] = "Special: +2 attribute total!";
            }
            
            // UNDERDOG MENTALITY (Nature)
            else if (card.special === "Underdog Mentality" && card.level < oppCard.level) {
                finalScores[i] += 5;
                activations[i] = "Special: +5 Underdog bonus!";
            }

            // SET MY OWN RULES (Nature)
            else if (card.special === "Set My Own Rules") {
                let otherAttrs = Object.keys(card.stats).filter(a => !activeBattleAttrs.includes(a) && a !== "Total" && typeof card.stats[a] === 'number');
                if (otherAttrs.length > 0) {
                    let bestAttr = otherAttrs.reduce((a, b) => card.stats[a] > card.stats[b] ? a : b);
                    finalScores[i] += card.stats[bestAttr];
                    finalScores[oppIdx] += (oppCard.stats[bestAttr] || 0);
                    activations[i] = `Rules Set: Added ${bestAttr.toUpperCase()}!`;
                }
            }

            // REINFORCEMENTS (Nature)
            else if (card.special === "Reinforcements") {
                const sameTypeCount = gameData.players[i].hand.filter(c => c.type === card.type).length;
                finalScores[i] += sameTypeCount;
                activations[i] = `Special: +${sameTypeCount} Reinforcements!`;
            }

            // BATTLE READY (Village)
            else if (card.special === "Battle Ready") {
                finalScores[i] += activeBattleAttrs.length;
                activations[i] = "Special: All attributes +1!";
            }

            // RESCUE MISSION (Village)
            else if (card.special === "Rescue Mission") {
                finalScores[i] -= 3;
                activations[i] = "RESCUE: Regaining lost ally (-3 score)";
            }

            // BONUS TRAINING (Village)
            else if (card.special === "Bonus Training") {
                let strongest = Object.keys(card.stats).filter(a => a !== "Total")
                    .reduce((a, b) => (card.stats[a] || 0) > (card.stats[b] || 0) ? a : b);
                finalScores[i] += 5;
                activations[i] = `Special: +5 bonus (${strongest})!`;
            }
        }
    });

    // --- PHASE 3: UPDATING FIREBASE ---
    const winnerIdx = finalScores[0] >= finalScores[1] ? 0 : 1;
    const loserIdx = 1 - winnerIdx;
    
    // SAFE COPY OF PLAYERS
    let newPlayers = gameData.players.map(p => ({
        ...p,
        hand: Array.isArray(p.hand) ? [...p.hand] : []
    }));

    // Standard card transfer
    const cardWon = gameData.activeCards[loserIdx];
    newPlayers[winnerIdx].hand.push(cardWon);

    // Rescue Mission Check
    [0, 1].forEach(i => {
        if (activations[i] && activations[i].includes("RESCUE")) {
            const oppIdx = 1 - i;
            if (newPlayers[oppIdx].hand.length > 1) { // Ensure they have a card other than the one just lost
                const regainedCard = newPlayers[oppIdx].hand.pop();
                newPlayers[i].hand.push(regainedCard);
            }
        }
    });

    let nextStatus = newPlayers[loserIdx].hand.length === 0 ? 'finished' : 'battle_result';

    try {
        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
        await updateDoc(gameRef, {
            status: nextStatus,
            players: newPlayers,
            battleResults: {
                scores: finalScores,
                winnerIdx,
                attrs: activeBattleAttrs,
                activations: activations
            }
        });
    } catch (err) {
        console.error("Firebase Update Error:", err);
        alert("Connection failed. Check your internet or Firebase rules.");
    }
}

    if (!res) return;

    screen.innerHTML = `

                <div class="flex-1 bg-slate-800 p-4 rounded-2xl border-4 animate-slide-right animate-clash-shake 
                    ${res.winnerIdx === 1 
                        ? 'border-green-500 animate-winner-ready shadow-2xl shadow-green-500/20' 
                        : 'border-red-900/50 animate-burn'}">
                    
                    <img src="${gameData.activeCards[1].image}" class="w-full h-32 object-contain bg-slate-900/50 rounded-xl mb-3 border border-white/5">
                    <div class="text-center font-bold mb-1 opacity-50 text-[10px] uppercase tracking-widest">${gameData.activeCards[1].name}</div>
                    
                    <div class="animate-score-reveal" style="animation-delay: 1s">
                        <div class="text-5xl font-black text-center text-purple-400 mb-1">${res.scores[1]}</div>
                    </div>

                    ${res.activations[1] ? `
                        <div class="animate-pop mt-2 p-2 bg-purple-500/10 border border-purple-500/20 rounded text-[9px] text-purple-300 italic text-center" style="animation-delay: 1.4s">
                            ✨ ${res.activations[1]}
                        </div>
                    ` : ''}
                </div>
            </div>

            <div class="text-center animate-pop" style="animation-delay: 2.5s">
                <div class="text-3xl font-black text-white mb-8 tracking-wide uppercase">
                    Player ${res.winnerIdx + 1} Victorious!
                </div>
                
                ${playerRole === 'p0' ? `
                    <button onclick="nextRound()" class="group relative bg-blue-600 hover:bg-blue-500 text-white px-16 py-5 rounded-full font-black shadow-xl transition-all hover:scale-110 active:scale-95">
                        <span class="relative z-10">CONTINUE JOURNEY →</span>
                        <div class="absolute inset-0 rounded-full bg-blue-400 blur-lg opacity-0 group-hover:opacity-40 transition-opacity"></div>
                    </button>
                ` : `
                    <div class="inline-flex items-center gap-3 bg-slate-800/80 px-8 py-4 rounded-full border border-white/5">
                        <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                        <span class="text-slate-400 font-bold text-sm">WAITING FOR HOST...</span>
                    </div>
                `}
            </div>
        </div>
    `;
}

        window.nextRound = async () => {
            const winnerIdx = gameData.battleResults.winnerIdx;
            const newActive = [null, null];
            newActive[winnerIdx] = gameData.activeCards[winnerIdx];

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                status: 'battle_selection',
                activeCards: newActive,
                battlefield: BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)],
                battleResults: null
            });
        };

        function renderEndGame() {
            const winnerIdx = gameData.battleResults.winnerIdx;
            screen.innerHTML = `
                <div class="text-center py-12">
                    <h2 class="text-6xl font-black text-yellow-500 mb-6">VICTORY</h2>

                    <button onclick="location.reload()" class="bg-white text-black px-12 py-4 rounded-full font-bold">Return to Menu</button>
                </div>
            `;
        }

        initAuth();
    </script>
