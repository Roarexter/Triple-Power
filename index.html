<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlefield Clash Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .gradient-border {
            background: linear-gradient(to bottom right, #3b82f6, #8b5cf6);
            padding: 2px;
            border-radius: 0.75rem;
        }
        
        .card-container { position: relative; }
        .stats-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            transition: opacity 0.2s, visibility 0.2s;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }
        .card-container:hover .stats-tooltip {
            visibility: visible;
            opacity: 1;
        }
        .stat-grid {
            display: grid;
            grid-template-cols: 1fr auto;
            gap: 2px 8px;
            font-size: 10px;
        }
        
        #game-screen { overflow: visible; padding-bottom: 120px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

        ];

        // Firebase Configuration
        const firebaseConfig = {

        const app = initializeApp(firebaseConfig);

let currentUser = null;
let gameId = null;
let gameData = null;
let playerRole = null; 
let isSinglePlayer = false; // Add this line

// --- 2. ADD SINGLE PLAYER INITIALIZATION (Put this here) ---
async function startSinglePlayer() {
    isSinglePlayer = true;
    playerRole = 'p0';
    gameId = 'local_game';
    
    // Create local game data structure
    gameData = {
        id: gameId,

        const screen = document.getElementById('game-screen');
        const statusText = document.getElementById('game-status');
        const userInfo = document.getElementById('user-info');
        const gameLog = document.getElementById('game-log');
        const logContainer = document.getElementById('log-container');

        // --- AUTHENTICATION ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error", err);
                statusText.innerText = "Connection failed. Please refresh.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {

                userInfo.innerText = `Logged in as: ${user.uid}`;

            }

        // --- UI UTILS ---
        function createStatsHTML(stats) {
            return `

                    <div class="text-[9px] font-bold text-blue-400 mb-1 border-b border-white/10 pb-1 uppercase">Attribute Stats</div>

                        `).join('')}
                    </div>
                </div>
            `;
        }

function updateBackgroundTheme() {
    if (!gameData || !gameData.battlefield) {
        document.body.style.background = "#0f172a"; // Default dark blue
        return;
    }

    const type = gameData.battlefield.type;
    
    if (type === "Nature") {
        // A deep forest green gradient
        document.body.style.background = "linear-gradient(to bottom, #064e3b, #0f172a)";
    } else if (type === "Village") {
        // A warm sunset/terracotta gradient
        document.body.style.background = "linear-gradient(to bottom, #451a03, #0f172a)";
    } else {
        document.body.style.background = "#0f172a";
    }
    
    // Smooth transition effect
    document.body.style.transition = "background 1s ease";
}
        
        // --- MATCHMAKING ---
        async function startMatchmaking() {
            statusText.innerText = "Searching for an opponent...";
            screen.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="spinner mb-6"></div>
                    <p class="text-xl font-bold animate-pulse">Searching for match...</p>
                    <button id="cancel-match" class="mt-8 text-slate-500 hover:text-white underline text-sm">Cancel</button>
                </div>
            `;

            document.getElementById('cancel-match').onclick = () => renderMainMenu();

            const lobbyRef = doc(db, 'artifacts', appId, 'public', 'data', 'lobby_global', 'open_game');
            const lobbiesSnap = await getDoc(lobbyRef);
            const lobbyData = lobbiesSnap.data();

            if (lobbyData && lobbyData.hostId !== currentUser.uid && lobbyData.status === 'waiting') {
                gameId = lobbyData.gameId;
                playerRole = 'p1';
                await updateDoc(lobbyRef, { status: 'filled' });
                await joinGame(gameId);
            } else {
                gameId = `game_${Date.now()}_${currentUser.uid}`;
                playerRole = 'p0';

                const newGame = {
                    id: gameId,
                    status: 'drafting',
                    createdAt: Date.now(),
                    players: [
                        { uid: currentUser.uid, name: "Player 1", hand: [] },
                        { uid: null, name: "Player 2", hand: [] }
                    ],
                    pool: [...CARDS_DATA].sort(() => Math.random() - 0.5),
                    draftOrder: [0, 1, 1, 0, 0, 1, 1, 0],
                    draftStep: 0,
                    activeCards: [null, null],
                    battlefield: null,
                    battleResults: null
                };

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), newGame);
                await setDoc(lobbyRef, { gameId, hostId: currentUser.uid, status: 'waiting' });
                watchGame(gameId);
            }
        }

        async function joinGame(id) {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', id);
            const snap = await getDoc(gameRef);
            let data = snap.data();
            data.players[1].uid = currentUser.uid;
            await updateDoc(gameRef, { players: data.players });
            watchGame(id);
        }

        function watchGame(id) {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', id), (snapshot) => {
                if (!snapshot.exists()) return;
                gameData = snapshot.data();
                processGameState();
            });
        }

        // --- GAME LOGIC ENGINE ---

// --- AI BRAIN LOGIC ---
async function triggerCPUMove() {
    // Only run if single-player is active and game isn't over
    if (!isSinglePlayer || gameData.status === 'finished') return;

    // Simulate "thinking" time
    setTimeout(async () => {
        if (gameData.status === 'drafting') {
            const pIdx = gameData.draftOrder[gameData.draftStep];
            // Only move if it's the CPU's turn (Player Index 1)
            if (pIdx === 1) { 
                const randomIdx = Math.floor(Math.random() * gameData.pool.length);
                await pickCard(randomIdx); 
            }
        } 
        else if (gameData.status === 'battle_selection') {
            // Only move if CPU hasn't picked a card yet
            if (gameData.activeCards[1] === null) {
                const cpuHand = gameData.players[1].hand;
                const randomIdx = Math.floor(Math.random() * cpuHand.length);
                await selectCardForBattle(randomIdx);
            }
        }
    }, 1200); // 1.2 second delay for realism
}
        
        function processGameState() {
    updateBackgroundTheme(); 

    // Don't wait for an opponent if we are in single player mode
    if (!isSinglePlayer && gameData.status === 'drafting' && !gameData.players[1].uid) {
        renderWaitingForOpponent();
        return;
    }

    if (gameData.status === 'drafting') {
        renderDraft();
    } else if (gameData.status === 'battle_selection') {
        renderBattleSelection();
    } else if (gameData.status === 'battle_result') {
        renderResultUI();
    } else if (gameData.status === 'finished') {
        renderEndGame();
    }

    // CRITICAL: This line "wakes up" the AI every time the state changes
    if (isSinglePlayer) {
        triggerCPUMove();
    }
}

            statusText.innerText = "WAITING FOR OPPONENT";
            screen.innerHTML = `

        function renderDraft() {
            const pIndex = gameData.draftOrder[gameData.draftStep];
            const isMyTurn = (pIndex === 0 && playerRole === 'p0') || (pIndex === 1 && playerRole === 'p1');
            
            statusText.innerText = isMyTurn ? "YOUR TURN TO PICK" : "WAITING FOR OPPONENT TO PICK";

            screen.innerHTML = `
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        ${gameData.pool.map((card, idx) => `
            <div class="card-container">
                <div onclick="${isMyTurn ? `pickCard(${idx})` : ''}" class="gradient-border ${isMyTurn ? 'cursor-pointer hover:-translate-y-1' : 'opacity-50 grayscale cursor-not-allowed'} transition-all shadow-md">
                    <div class="bg-slate-800 p-2 rounded-lg h-full flex flex-col">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-white/10 text-slate-300">${card.type}</span>
                            <span class="text-[8px] font-bold text-yellow-500">LVL ${card.level}</span>
                        </div>

                        <h3 class="font-bold text-[11px] truncate leading-tight">${card.name}</h3>
                        <p class="text-[8px] text-slate-500 mt-0.5 italic truncate">${card.special}</p>
                    </div>
                </div>
                ${createStatsHTML(card.stats)}
            </div>
        `).join('')}
    </div>
`;
        }

        window.pickCard = async (idx) => {
    const pIdx = gameData.draftOrder[gameData.draftStep];
    const card = gameData.pool[idx];
    
    // Update local data
    gameData.pool.splice(idx, 1);
    gameData.players[pIdx].hand.push(card);
    gameData.draftStep++;

    if (gameData.draftStep >= gameData.draftOrder.length) {
        gameData.status = 'battle_selection';
        gameData.battlefield = BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)];
    }

    if (isSinglePlayer) {
        processGameState(); // Just refresh the screen locally
    } else {
        // Original Firebase logic
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
            pool: gameData.pool,
            players: gameData.players,
            draftStep: gameData.draftStep,
            status: gameData.status,
            battlefield: gameData.battlefield
        });
    }
};

        function renderBattleSelection() {
            const myIdx = playerRole === 'p0' ? 0 : 1;
            const myCardSelected = gameData.activeCards[myIdx] !== null;
            const oppCardSelected = gameData.activeCards[1 - myIdx] !== null;

            if (gameData.activeCards[0] && gameData.activeCards[1]) {
                if (playerRole === 'p0') resolveBattle();
                statusText.innerText = "RESOLVING CLASH...";
                screen.innerHTML = `<div class="flex justify-center py-20"><div class="spinner"></div></div>`;

            }

            statusText.innerText = myCardSelected ? "Waiting for opponent's selection..." : "SELECT YOUR CHAMPION";

                    <h2 class="text-3xl font-black text-white mb-2">${field.name}</h2>
                    <div class="flex justify-center gap-2">
                        ${field.attrs.map(a => `<span class="px-2 py-1 bg-white/5 rounded text-xs font-mono text-slate-300 capitalize border border-white/5">${a}</span>`).join('')}
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    ${myCardSelected ? `
                        <div class="p-8 text-center bg-blue-500/10 rounded-xl border border-blue-500/20 animate-pulse">
                            <p class="font-bold text-blue-400">UNIT DEPLOYED: ${gameData.activeCards[myIdx].name}</p>
                            <p class="text-xs text-slate-500 mt-2">Awaiting your opponent's move...</p>
                        </div>
                    ` : `
                        <div class="flex flex-wrap justify-center gap-4">
                            ${myPlayer.hand.map((card, idx) => `
    <div class="card-container">
   <div onclick="selectCardForBattle(${idx})" class="w-28 bg-slate-800 p-2.5 rounded-xl border-2 border-transparent hover:border-blue-500 cursor-pointer transition-all hover:scale-105 shadow-lg">
   <img src="${card.image}" class="w-full h-20 object-contain bg-slate-900/50 rounded-lg mb-2 shadow-md" alt="${card.name}">
   
    <div class="flex justify-between items-center mb-1">
        <span class="text-[8px] font-bold text-slate-500 px-1.5 py-0.5 bg-white/5 rounded">${card.type}</span>
        <span class="text-[8px] font-black text-yellow-600">L${card.level}</span>
    </div>
    <div class="text-[11px] font-bold truncate">${card.name}</div>
</div>
        ${createStatsHTML(card.stats)}
    </div>
`).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        window.selectCardForBattle = async (cardIdx) => {
    const myIdx = (isSinglePlayer && gameData.status === 'battle_selection' && gameData.activeCards[0] !== null) ? 1 : (playerRole === 'p0' ? 0 : 1);
    
    const myHand = [...gameData.players[myIdx].hand];
    const selected = myHand.splice(cardIdx, 1)[0];
    
    gameData.players[myIdx].hand = myHand;
    gameData.activeCards[myIdx] = selected;

    if (isSinglePlayer) {
        processGameState();
        // Trigger battle resolution immediately if both cards are now selected
        if (gameData.activeCards[0] && gameData.activeCards[1]) {
            resolveBattle();
        }
    } else {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
            players: gameData.players,
            activeCards: gameData.activeCards
        });
    }
};

        async function resolveBattle() {
    // 1. Safety Check: Ensure game data is loaded
    if (!gameData || !gameData.activeCards || !gameData.battlefield) {
        console.error("Missing game data for battle");
        return;
    }

    const field = gameData.battlefield;
    const card0 = gameData.activeCards[0];
    const card1 = gameData.activeCards[1];
    
    if (!card0 || !card1) return;

    // 2. Setup Variables
    let activeBattleAttrs = [...field.attrs];
    let activations = ["", ""]; 
    let finalScores = [0, 0];

    // --- PHASE 1: FIELD MODIFICATION (Narrow It Down - Village Only) ---
    [card0, card1].forEach((card, i) => {
        // Standard Check: Type must match field type
        const typeMatches = (card.type === field.type);
        
        if (typeMatches && card.special === "Narrow It Down") {
            let weakest = activeBattleAttrs.reduce((prev, curr) => 
                (card.stats[curr] || 0) < (card.stats[prev] || 0) ? curr : prev
            );
            activeBattleAttrs = activeBattleAttrs.filter(a => a !== weakest);
            activations[i] = `Special: ${weakest.toUpperCase()} dropped!`;
        }
    });

    // --- PHASE 2: SCORE CALCULATION & TYPE-GATED SPECIALS ---
    [card0, card1].forEach((card, i) => {
        const oppIdx = 1 - i;
        const oppCard = [card0, card1][oppIdx];
        const typeMatches = (card.type === field.type);
        
        // 1. Calculate Base Score (Everyone gets this)
        activeBattleAttrs.forEach(attr => { 
            finalScores[i] += (card.stats[attr] || 0); 
        });

        // 2. ONLY run specials if the card type matches the battlefield type
        if (typeMatches && card.special) {
            
            // FOCUSED TRAINING (Nature)
            if (card.special === "Focused Training") {
                finalScores[i] += 2;
                activations[i] = "Special: +2 attribute total!";
            }
            
            // UNDERDOG MENTALITY (Nature)
            else if (card.special === "Underdog Mentality" && card.level < oppCard.level) {
                finalScores[i] += 5;
                activations[i] = "Special: +5 Underdog bonus!";
            }

            // SET MY OWN RULES (Nature)
            else if (card.special === "Set My Own Rules") {
                let otherAttrs = Object.keys(card.stats).filter(a => !activeBattleAttrs.includes(a) && a !== "Total" && typeof card.stats[a] === 'number');
                if (otherAttrs.length > 0) {
                    let bestAttr = otherAttrs.reduce((a, b) => card.stats[a] > card.stats[b] ? a : b);
                    finalScores[i] += card.stats[bestAttr];
                    finalScores[oppIdx] += (oppCard.stats[bestAttr] || 0);
                    activations[i] = `Rules Set: Added ${bestAttr.toUpperCase()}!`;
                }
            }

            // REINFORCEMENTS (Nature)
            else if (card.special === "Reinforcements") {
                const sameTypeCount = gameData.players[i].hand.filter(c => c.type === card.type).length;
                finalScores[i] += sameTypeCount;
                activations[i] = `Special: +${sameTypeCount} Reinforcements!`;
            }

            // BATTLE READY (Village)
            else if (card.special === "Battle Ready") {
                finalScores[i] += activeBattleAttrs.length;
                activations[i] = "Special: All attributes +1!";
            }

            // RESCUE MISSION (Village)
            else if (card.special === "Rescue Mission") {
                finalScores[i] -= 3;
                activations[i] = "RESCUE: Regaining lost ally (-3 score)";
            }

            // BONUS TRAINING (Village)
            else if (card.special === "Bonus Training") {
                let strongest = Object.keys(card.stats).filter(a => a !== "Total")
                    .reduce((a, b) => (card.stats[a] || 0) > (card.stats[b] || 0) ? a : b);
                finalScores[i] += 5;
                activations[i] = `Special: +5 bonus (${strongest})!`;
            }
        }
    });

    // --- PHASE 3: UPDATING STATE ---
    const winnerIdx = finalScores[0] >= finalScores[1] ? 0 : 1;
    const loserIdx = 1 - winnerIdx;
    
    let newPlayers = gameData.players.map(p => ({
        ...p,
        hand: Array.isArray(p.hand) ? [...p.hand] : []
    }));

    const cardWon = gameData.activeCards[loserIdx];
    newPlayers[winnerIdx].hand.push(cardWon);

    // Rescue Mission Check
    [0, 1].forEach(i => {
        if (activations[i] && activations[i].includes("RESCUE")) {
            const oppIdx = 1 - i;
            if (newPlayers[oppIdx].hand.length > 1) { 
                const regainedCard = newPlayers[oppIdx].hand.pop();
                newPlayers[i].hand.push(regainedCard);
            }
        }
    });

    let nextStatus = newPlayers[loserIdx].hand.length === 0 ? 'finished' : 'battle_result';

    const resultsData = {
        status: nextStatus,
        players: newPlayers,
        battleResults: {
            scores: finalScores,
            winnerIdx,
            attrs: activeBattleAttrs,
            activations: activations
        }
    };

    if (isSinglePlayer) {
        // Explicitly update the local state for card transfers
        gameData.status = resultsData.status;
        gameData.players = resultsData.players; 
        gameData.battleResults = resultsData.battleResults;
        
        processGameState();
    } else {
        try {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
            await updateDoc(gameRef, resultsData);
        } catch (err) {
            console.error("Firebase Update Error:", err);
        }
    }
} // Ensure this closing brace for the function is present

        </div>

        <div class="flex justify-between gap-6 mb-8 max-w-3xl mx-auto">
            
            <div class="flex-1 bg-slate-800 p-4 rounded-2xl border-4 ${res.winnerIdx === 0 ? 'border-green-500 shadow-lg' : 'border-red-900/30'}">
                <img src="${gameData.activeCards[0].image}" class="w-full h-32 object-contain bg-slate-900/50 rounded-xl mb-3 border border-white/10">
                <div class="text-center font-bold mb-1 opacity-80 text-[10px] uppercase tracking-tighter">${gameData.activeCards[0].name}</div>
                <div class="text-4xl font-black text-center text-blue-400 mb-2">${res.scores[0]}</div>
                
                ${res.activations[0] ? `
                    <div class="mt-2 p-2 bg-blue-500/10 border border-blue-500/20 rounded text-[9px] text-blue-300 italic animate-pulse text-center">
                        ✨ ${res.activations[0]}
                    </div>
                ` : ''}
                </div>

            <div class="flex items-center text-2xl font-black italic text-slate-700">VS</div>

            <div class="flex-1 bg-slate-800 p-4 rounded-2xl border-4 ${res.winnerIdx === 1 ? 'border-green-500 shadow-lg' : 'border-red-900/30'}">
                <img src="${gameData.activeCards[1].image}" class="w-full h-32 object-contain bg-slate-900/50 rounded-xl mb-3 border border-white/10">
                <div class="text-center font-bold mb-1 opacity-80 text-[10px] uppercase tracking-tighter">${gameData.activeCards[1].name}</div>
                <div class="text-4xl font-black text-center text-purple-400 mb-2">${res.scores[1]}</div>
                
                ${res.activations[1] ? `
                    <div class="mt-2 p-2 bg-purple-500/10 border border-purple-500/20 rounded text-[9px] text-purple-300 italic animate-pulse text-center">
                        ✨ ${res.activations[1]}
                    </div>
                ` : ''}
                </div>
        </div>
        
        <div class="text-center">
            <div class="text-3xl font-black mb-4">Player ${res.winnerIdx + 1} Wins!</div>
            ${playerRole === 'p0' ? `<button onclick="nextRound()" class="bg-blue-600 px-12 py-4 rounded-full font-bold shadow-lg hover:bg-blue-500 transition-all active:scale-95">Next Battlefield</button>` : `<p class="animate-pulse text-slate-500 text-sm">Waiting for Host to pick next field...</p>`}
        </div>
    `;
}

        window.nextRound = async () => {
    const winnerIdx = gameData.battleResults.winnerIdx;
    const currentWinningCard = gameData.activeCards[winnerIdx]; // Renamed for safety
    
    gameData.activeCards = [null, null];
    gameData.activeCards[winnerIdx] = currentWinningCard; 
    
    gameData.status = 'battle_selection';
    gameData.battlefield = BATTLEFIELDS[Math.floor(Math.random() * BATTLEFIELDS.length)];
    gameData.battleResults = null;

    if (isSinglePlayer) {
        processGameState(); //
    } else {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
            status: gameData.status,
            activeCards: gameData.activeCards,
            battlefield: gameData.battlefield,
            battleResults: null
        });
    }
};

        function renderEndGame() {
            const winnerIdx = gameData.battleResults.winnerIdx;
            screen.innerHTML = `
                <div class="text-center py-12">
                    <h2 class="text-6xl font-black text-yellow-500 mb-6">VICTORY</h2>
                    <p class="text-2xl mb-12">Player ${winnerIdx + 1} Wins!</p>
                    <button onclick="location.reload()" class="bg-white text-black px-12 py-4 rounded-full font-bold">Return to Menu</button>
                </div>
            `;
        }

        initAuth();
    </script>
